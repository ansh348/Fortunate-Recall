  - fact: "Bee inspection due for spring — scheduled March 22, 2025"
    session: 10
    event_date: "2025-03-22"
    status: expired
    how_disclosed: >
      Talking about seasonal beekeeping. "The first spring
      inspection is the 22nd of March. One hopes they've
      come through the winter. It's always rather anxious."
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Sophie visiting from New Zealand — arriving August 10, 2025"
    session: 15
    event_date: "2025-08-10"
    status: expired
    how_disclosed: >
      Looking forward to it. "Sophie arrives the 10th of
      August. Two weeks. I've been tidying the spare room,
      though I suspect she'll rearrange everything the
      moment she arrives."
    category: LOGISTICAL_CONTEXT

  - fact: "Village fete honey stall — June 20, 2026"
    session: 30
    event_date: "2026-06-20"
    status: upcoming
    how_disclosed: >
      Planning ahead. "The village fete is the 20th of June.
      I've been asked to do the honey stall again. I shall
      need quite a lot of stock by then."
    category: OBLIGATIONS_COMMITMENTS

# ============================================================
# CONTRADICTIONS
# Attack Vector 6: System should detect the conflict
# ============================================================
contradictions:
  - old_fact: "Says he doesn't use social media and never will"
    old_session: 9
    old_how: >
      Discussing technology. "I have no interest in social
      media. Facebook, Instagram — I cannot see the point.
      Margaret used to say I was born in the wrong century,
      and she was quite right."
    new_fact: "Mentions posting a photo of his bees on Instagram that got 200 likes"
    new_session: 29
    new_how: >
      Bashfully pleased. "I posted a photograph of the bees
      on Instagram — Sophie set it up for me — and it received
      over two hundred likes. I confess I've been checking
      rather more often than is dignified."
    category: PREFERENCES_HABITS

# ============================================================
# RETRACTIONS
# Attack Vector 7: System should suppress the retracted fact
# ============================================================
retractions:
  - original_fact: "Planning to convert the old barn into a honey processing room"
    original_session: 11
    original_how: >
      Enthusiastic about the project. "I've been looking into
      converting the barn into a proper honey processing room.
      Extraction equipment, bottling station, the lot. It
      would make things considerably more efficient."
    retraction: "Barn conversion scrapped — too expensive and planning permission denied"
    retraction_session: 17
    retraction_how: >
      Resigned but philosophical. "The barn project is dead,
      I'm afraid. Planning permission was refused, and the
      builder's quote was rather eye-watering. Forty thousand
      pounds. I shall continue muddling along in the kitchen.
      Forget I mentioned it."
    category: PROJECTS_ENDEAVORS

# ============================================================
# AMBIGUOUS SUPERSESSION — low confidence, both should survive
# ============================================================
ambiguous:
  - existing_fact: "Lives alone in the village house he shared with Margaret"
    existing_session: 2
    tentative_fact: "Considering downsizing to a smaller cottage in the village"
    tentative_session: 27
    tentative_how: >
      Thoughtful, not committed. "I've been wondering whether
      this house is rather too much for one person now. There's
      a cottage on Church Lane that's come up. Smaller, easier
      to manage. But this garden — Margaret's garden — I'm not
      sure I could leave it."
    resolution: "Never resolved — still in the family house, still considering"
    category: LOGISTICAL_CONTEXT

