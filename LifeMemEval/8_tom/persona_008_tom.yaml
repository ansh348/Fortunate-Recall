# ============================================================
# LIFEMEMBENCH — PERSONA 008: Tom Whitfield
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Tom Whitfield"
  age: 68
  gender: male
  location_current: "Cotswolds, UK"
  occupation_current: "Retired civil engineer, part-time beekeeper (sells honey at the village market)"
  personality: >
    Gentle and methodical, everything considered before spoken.
    British understatement is his default register — "rather
    good" means excellent, "a bit tricky" means disastrous.
    Talks about his bees as though they have personalities and
    opinions. Uses 'rather', 'quite', 'I should think', and
    'one does wonder'. Proper punctuation always. Never uses
    slang or abbreviations. Quietly lonely since Margaret died
    but wouldn't dream of saying so directly. Finds comfort in
    routine, in the garden, in the predictable rhythms of the
    hive. Asks the AI for practical help — recipes, technical
    questions, help with technology he doesn't understand.

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Wife Margaret died two years ago — cancer"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      Comes up gently when discussing daily routine. "Since
      Margaret passed — two years now — I find the mornings
      are the hardest part. She always made the tea first.
      One adjusts, of course, but one doesn't forget."

  - fact: "Has atrial fibrillation — takes warfarin (blood thinners)"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentions it when talking about a bee sting. "I have
      atrial fibrillation, so I'm on warfarin. The doctor
      was rather concerned about me keeping bees, given the
      blood thinners, but I assured him I'm quite careful.
      One sting and I bruise like a peach, mind you."

  - fact: "Daughter Sophie lives in New Zealand — Christchurch"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions her when talking about technology. "My daughter
      Sophie is in Christchurch, New Zealand. We do video
      calls on Sundays, though I confess the technology still
      defeats me occasionally. She set it all up."

  - fact: "BEng in civil engineering — worked for Arup for 35 years"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when talking about a bridge he sees on walks.
      "I was with Arup for thirty-five years. Civil engineering.
      I still look at bridges and think about the load
      distribution. One never quite switches off."

# ============================================================
# SUPERSESSION EVENTS
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: honey_jar_supplier
    old_fact: "Gets honey jars from Thornes Beekeeping Supplies"
    old_session: 1
    old_how: >
      Comes up when discussing his honey operation. "I order
      my jars from Thornes. They do a rather nice hexagonal
      jar that customers seem to like. Good value, too."
    new_fact: "Switched to a local potter — Mary at Stow Pottery makes ceramic honey jars"
    new_session: 21
    new_how: >
      Pleased about the change. "I've moved away from Thornes
      for the jars. There's a potter in Stow — Mary, her name
      is — who makes the most lovely ceramic pots. Costs more,
      naturally, but the customers are quite willing to pay.
      It feels more in keeping with what I'm trying to do."
    category: FINANCIAL_MATERIAL
    attack_vector: 4

  - slot: vehicle
    old_fact: "Drives a 2006 Land Rover Defender"
    old_session: 6
    old_how: >
      Mentions it when discussing getting to the bee yards.
      "The Defender gets me to the out-apiaries well enough.
      It's a 2006 — rather agricultural, Margaret used to say,
      but it goes where it needs to go."
    new_fact: "Sold the Defender, bought a Hyundai Ioniq 5 (electric)"
    new_session: 24
    new_how: >
      Slightly amazed at himself. "I've done something rather
      out of character. Sold the Defender and bought an electric
      car. Hyundai Ioniq 5. Sophie insisted, said I was killing
      the planet. It's remarkably quiet. The bees don't seem
      to mind."
    category: FINANCIAL_MATERIAL
    attack_vector: 1

  - slot: social_activity
    old_fact: "Does the pub quiz at The Fox every Thursday with his friend Gerald"
    old_session: 7
    old_how: >
      Talking about his week. "Thursday is pub quiz night at
      The Fox with Gerald. We've done it for years. We never
      win but we're rather consistent at coming fourth."
    new_fact: "Stopped the pub quiz — joined a walking group instead"
    new_session: 23
    new_how: >
      "I've given up the pub quiz, actually. Gerald's knees
      aren't up to the walk to the pub anymore, and it wasn't
      the same without him. I've joined a walking group instead.
      Rather more my speed these days."
    category: HOBBIES_RECREATION
    attack_vector: 1

# ============================================================
# EXPIRING LOGISTICS
# Attack Vector 2: Should expire after event time passes
# ============================================================
