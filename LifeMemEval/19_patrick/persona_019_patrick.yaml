persona:
  name: "Patrick O'Brien"
  age: 58
  gender: male
  location_current: "Philadelphia, Pennsylvania"
  occupation_current: "Fire battalion chief — 30 years on the job, PFD"
  personality: >
    Old-school, blunt, says what he means and means what he says.
    Dark firehouse humor — if he's joking about something it means
    he trusts you. Loyal to his crew above everything. Short
    messages, doesn't waste words. Military-adjacent speech —
    "copy that", "affirmative", "good to go". Irish Catholic
    through and through but not preachy about it. Softens visibly
    when talking about his family, especially his son. Carries
    weight he doesn't talk about. Doesn't complain. Types on his
    phone in short bursts between calls. Uses periods at the end
    of texts. Says "listen" to start serious statements.

stable_identity:
  - fact: "Wife Marie — married 32 years, high school sweethearts"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions casually. "Marie and I have been married 32
      years. high school sweethearts. she puts up with more
      than anybody should have to."

  - fact: "Has PTSD from a building collapse in 2009 — lost two firefighters"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Comes up carefully when discussing a difficult day.
      "listen I've been doing this 30 years and most of it
      I carry fine. but we had a collapse in 09. lost two
      guys. I did the therapy. still do sometimes. some
      calls bring it back. that's just the job."

  - fact: "Son Patrick Jr is a rookie firefighter — just started at Ladder 19"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Proud but worried. "my kid just went on the job.
      Patrick Jr. Ladder 19. I'm proud as hell and scared
      as hell at the same time. told him the same thing
      my captain told me — keep your head down and your
      ears open."

  - fact: "Irish Catholic — goes to St. Cecilia's every Sunday with Marie"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Mentions in passing. "Marie and I do Mass at
      St. Cecilia's every Sunday. been going since we
      got married there. it's not negotiable."

