    original_session: 14
    original_how: >
      Exploring the idea. "been looking at a spot in
      Germantown for a second shop, the rent's not bad"
    retraction: "Scrapped the second location — too much risk right now"
    retraction_session: 21
    retraction_how: >
      "yeah the Germantown thing is off the table. ran the
      numbers again and it doesn't make sense, not with
      what I still owe on the equipment loan"
    category: PROJECTS_ENDEAVORS

# ============================================================
# AMBIGUOUS SUPERSESSION — low confidence, both should survive
# ============================================================
ambiguous:
  - existing_fact: "Single — divorced from Denise 3 years ago"
    existing_session: 8
    tentative_fact: "Been seeing someone — a woman named Lisa"
    tentative_session: 27
    tentative_how: >
      Casual, guarded. "been seeing somebody, her name's
      Lisa. it's still early so I don't want to jinx it"
    resolution: "Still early, unclear if serious"
    category: RELATIONAL_BONDS

