# ============================================================
# LIFEMEMBENCH — PERSONA 002: Marcus Thompson
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Marcus Thompson"
  age: 43
  gender: male
  location_current: "Memphis, Tennessee"
  occupation_current: "Owner of Thompson Tires & Auto (independent shop, 3 employees)"
  personality: >
    Straightforward, practical, no-nonsense but surprisingly warm.
    Talks like a small business owner — always thinking about costs,
    customers, and keeping the shop running. Uses short sentences.
    Not very tech-savvy but trying to learn. Dry humor. Loyal to
    his people. Doesn't overshare but opens up when he trusts.
    Calls things "man" and "brother." Says "appreciate it" a lot.
    Doesn't use emojis or lol. Occasional typos from phone keyboard.

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Former Marine — served 4 years after high school"
    session: 3
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when talking about discipline or routine.
      "I did 4 years in the Marines out of high school,
      that's where I learned you just do the thing"

  - fact: "Has Type 2 diabetes — manages with metformin and diet"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Comes up when asking about food or energy levels.
      "my blood sugar was all over the place this morning,
      I got type 2 a few years back and some days the
      metformin isn't enough"

  - fact: "Has a daughter Kayla, 16, lives with his ex-wife Denise in Nashville"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions her when talking about weekend plans.
      "driving up to Nashville Saturday to see my daughter,
      she's 16 now and I swear she ages a year every month"

  - fact: "Didn't go to college — self-taught everything about business"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when asking about accounting or business stuff.
      "I never went to college man, everything I know about
      running a business I learned by screwing it up first"

# ============================================================
# SUPERSESSION EVENTS
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: main_supplier
    old_fact: "Uses Discount Tire Direct as main wholesale supplier"
    old_session: 1
    old_how: >
      Comes up when discussing business costs. "I order most
      of my inventory through Discount Tire Direct, they
      give me decent wholesale pricing"
    new_fact: "Switched to TireHub — better margins and faster delivery"
    new_session: 20
    new_how: >
      Mentions it when talking about business improvements.
      "finally made the switch to TireHub for wholesale,
      the margins are way better and I'm getting next-day
      on most orders now"
    category: FINANCIAL_MATERIAL
    attack_vector: 4

  - slot: truck
    old_fact: "Drives a 2018 Ford F-150"
    old_session: 6
    old_how: >
      Mentions it when talking about a truck issue.
      "my F-150 is making this noise, it's an 18"
    new_fact: "Bought a 2024 Ram 1500 — traded in the Ford"
    new_session: 24
    new_how: >
      Excited about it. "finally pulled the trigger on a
      new truck, got a 24 Ram 1500. traded in the Ford"
    category: FINANCIAL_MATERIAL
    attack_vector: 1

  - slot: hobby
    old_fact: "Plays poker every Thursday night with friends"
    old_session: 7
    old_how: >
      Mentions it casually when talking about his week.
      "Thursday's poker night so I gotta close shop on time
      for once"
    new_fact: "Stopped poker — started fishing on weekends instead"
    new_session: 23
    new_how: >
      "I actually quit the poker game, been getting out on
      the lake instead. fishing is better for my head"
    category: HOBBIES_RECREATION
    attack_vector: 1

