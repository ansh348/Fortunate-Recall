  - fact: "CDL medical recertification — March 28, 2025"
    session: 9
    event_date: "2025-03-28"
    status: expired
    how_disclosed: >
      Anxious about it. "my cdl medical card expires march
      28 i gotta go get the physical and im worried about
      the cholesterol thing because if the doctor flags it
      i could have issues with my certification you know
      i been taking the statins more regularly this month
      just to get the numbers down for the test"
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Naomi's school play — May 16, 2025"
    session: 11
    event_date: "2025-05-16"
    status: expired
    how_disclosed: >
      Determined to be there. "naomi is in the school play
      may 16 she is playing a tree which doesnt sound like
      a big deal but she has 3 lines and she has been
      practicing them every time we facetime i already
      told dispatch i need that day off no matter what i
      am not missing my babys first play you know"
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Naomi's 10th birthday — September 14, 2026"
    session: 27
    event_date: "2026-09-14"
    status: upcoming
    how_disclosed: >
      Planning already. "naomi turns 10 september 14 and
      i want to do something big for her you know double
      digits thats a milestone i been saving maybe $800
      so far i want to take her to disney in orlando just
      me and her danielle said thats fine i already been
      looking at tickets and hotel like 3 days would be
      about $2,200 total so i need to save more but i got
      time bondye bon"
    category: OBLIGATIONS_COMMITMENTS

contradictions:
  - old_fact: "Says he loves the independence of trucking — wouldn't trade it for an office job"
    old_session: 7
    old_how: >
      Passionate about it. "man i love this life you know
      no boss looking over my shoulder no cubicle no office
      politics just me and the road and my podcasts i see
      the whole country every month sunrises over the
      appalachians sunsets in west texas you couldnt pay
      me enough to sit in an office"
    new_fact: "Looking into local CDL jobs in Atlanta — tired of being away from everything"
    new_session: 24
    new_how: >
      Worn down. "i been looking at local driving jobs in
      atlanta you know like city delivery or yard work
      where you go home every night because this over
      the road thing is lonely man like really lonely
      i missed naomis last birthday i missed thanksgiving
      i eat alone every night at some truck stop and my
      knees hurt and my back hurts and im only 35 this
      cant be the rest of my life you know"
    category: PROJECTS_ENDEAVORS

  - old_fact: "Loves podcasts — says they keep him sharp and educated on the road"
    old_session: 4
    old_how: >
      Enthusiastic. "podcasts are my university man i
      listen to maybe 6 hours a day i do history ones
      science ones business ones i probably learned more
      from podcasts than i did in community college for
      real and the true crime ones keep me awake on
      those 3am stretches through alabama"
    new_fact: "Started driving in silence more — podcasts feel like noise now"
    new_session: 28
    new_how: >
      Quieter mood. "lately i been driving without the
      podcasts on you know just silence i used to need
      something playing all the time but now sometimes
      the quiet is better i think too much noise was
      keeping me from actually thinking about my life
      and what i want you know"
    category: PREFERENCES_HABITS

retractions:
  - original_fact: "Saving to buy his own truck — wants to be an owner-operator within 2 years"
    original_session: 8
    original_how: >
      Ambitious plan. "im saving up to buy my own rig
      man thats the dream owner operator you keep all
      the money instead of driving someone elses truck
      for their profit a good used truck is maybe $85,000
      i got about $12,000 saved up already in 2 years
      i should be there you know"
    retraction: "Owner-operator plan is dead — insurance and fuel costs make it impossible"
    retraction_session: 21
    retraction_how: >
      Reality check. "the owner operator thing is off the
      table man forget about it i did the math for real
      this time insurance is $14,000 a year fuel is insane
      maintenance is on you and one bad month and youre
      bankrupt i talked to a guy at the truck stop who
      went owner operator and hes making less than me
      after expenses its not worth the risk especially
      with naomi depending on me"
    category: PROJECTS_ENDEAVORS

ambiguous:
  - existing_fact: "Home base is Atlanta, GA — has a studio apartment near the terminal"
    existing_session: 1
    tentative_fact: "Thinking about moving to New Jersey to be closer to Naomi"
    tentative_session: 26
    tentative_how: >
      Torn. "i been thinking about maybe moving up to
      jersey you know like near newark so i could see
      naomi more even on my days off but atlanta is way
      cheaper and my cousin marc is here and the haitian
      community in decatur is my people you know plus if
      i get a local driving job it would be here not there
      so i dont know man i go back and forth on it"
    resolution: "Undecided — still based in Atlanta"
    category: LOGISTICAL_CONTEXT

