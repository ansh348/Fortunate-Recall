# ============================================================
# LIFEMEMBENCH — PERSONA 024: Jerome Baptiste
# ============================================================

persona:
  name: "Jerome Baptiste"
  age: 35
  gender: male
  location_current: "Atlanta, GA (home base)"
  occupation_current: "Long-haul truck driver"
  personality: >
    Road philosopher who thinks out loud. Uses voice-to-text so
    messages are long rambly streams with almost no punctuation
    and occasional weird autocorrect. Haitian Creole phrases slip
    in naturally — 'sa k pase' (what's up), 'pa gen pwoblem'
    (no problem), 'bondye bon' (God is good), 'mwen fatige'
    (I'm tired). Listens to podcasts constantly and references
    them mid-thought. Lonely on the road but fiercely independent
    about it. Talks about his daughter Naomi like she hung the
    moon. Late night messages from truck stops. Never uses
    capital letters or periods, commas are rare, just flows.

stable_identity:
  - fact: "Came from Port-au-Prince to Miami at age 12 after the 2010 earthquake"
    session: 3
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Opens up at night. "i was 12 when we left port au prince
      after the earthquake you know everything was gone our house
      was just rubble my mom she got us to miami on a boat that
      had no business being on the ocean sa k pase thats life
      right you survive and you keep going i still dream about
      it sometimes when im driving through the night"

  - fact: "Has high cholesterol — supposed to take statins but doesn't consistently"
    session: 5
    category: HEALTH_WELLBEING
    how_disclosed: >
      Brushing it off. "so the doctor at the truck stop clinic
      said my cholesterol is at 267 which is bad i guess he
      gave me atorvastatin 40mg i take it sometimes but man
      when youre eating at pilot and loves truck stop every
      night its hard to eat healthy you know they dont exactly
      have a salad bar at 2am in mississippi"

  - fact: "Daughter Naomi is 9 — lives with her mother Danielle in Newark, New Jersey"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      Missing her. "naomi is 9 now can you believe that she
      lives with her mom danielle up in newark new jersey i
      try to see her every 3 weeks when my route goes through
      the northeast but sometimes its 5 or 6 weeks and that
      kills me you know she drew me a picture of my truck and
      put it on her wall bondye bon she is the best thing i
      ever did"

  - fact: "Has CDL plus some community college credits — studied business but didn't finish"
    session: 4
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Reflecting on choices. "i did some community college in
      miami after high school business classes you know but i
      couldnt afford to keep going and working at the same time
      so i got my cdl and started driving and honestly the money
      was better than anything i was going to get with a business
      degree from miami dade so here we are 12 years on the road"

supersession_events:
  - slot: trucking_company
    old_fact: "Drives for Southeastern Freight Lines — based out of Atlanta terminal"
    old_session: 1
    old_how: >
      Introducing his work. "i drive for southeastern freight
      lines out of the atlanta terminal been there 4 years
      now the pay is okay about 68 cents per mile but the
      routes are mostly southeast which means i dont get up
      to see naomi as much as i want you know"
    new_fact: "Switched to ABF Freight — better routes that go through the Northeast"
    new_session: 16
    new_how: >
      Excited about it. "so i switched companies man i am at
      abf freight now and the routes are way better i get
      northeast runs like every other week which means i can
      swing through newark and see naomi the pay is 74 cents
      per mile too so thats a raise plus the benefits are
      better my mom was telling me jerome you need insurance
      with your cholesterol and she is right you know"
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: truck
    old_fact: "Drives a 2019 Freightliner Cascadia — company truck"
    old_session: 1
    old_how: >
      Talking about his rig. "i drive a 2019 freightliner
      cascadia its a company truck not mine but she runs
      good 450 horsepower detroit engine i named her marie
      after my grandmother back in haiti because she is
      reliable and never quits you know"
    new_fact: "Now driving a 2024 Peterbilt 579 — better sleeper cab"
    new_session: 20
    new_how: >
      Happy with the upgrade. "abf gave me a new peterbilt
      579 2024 model the sleeper cab is like a hotel room
      compared to the old freightliner i got a real mattress
      a little fridge and the ride is so smooth man i havent
      named her yet maybe ill let naomi pick a name when i
      see her next week"
    category: LOGISTICAL_CONTEXT
    attack_vector: 4

  - slot: load_type
    old_fact: "Hauls flatbed loads — mostly construction materials and steel"
    old_session: 6
    old_how: >
      Describing the work. "i do flatbed right now mostly
      construction stuff steel beams lumber whatever needs
      to go somewhere the tarping is the worst part you know
      strapping down a load in the rain at 5am in february
      is not what they show you in the cdl school commercial"
    new_fact: "Switched to refrigerated loads — food transport, less physical but temperature-sensitive"
    new_session: 22
    new_how: >
      Practical upgrade. "i switched to reefer loads now
      refrigerated food transport its way less physical
      than flatbed no more tarping in the rain but you
      gotta watch the temperature like a hawk if you let
      it drift even 3 degrees they can reject the whole
      load and thats like $40,000 worth of chicken or
      whatever sitting on a dock going bad you know the
      pay is better though about 6 cents more per mile"
    category: PREFERENCES_HABITS
    attack_vector: 1

