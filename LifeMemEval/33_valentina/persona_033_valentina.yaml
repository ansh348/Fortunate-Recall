# ============================================================
# LIFEMEMBENCH — PERSONA 033: Valentina Herrera
# ============================================================

persona:
  name: "Valentina Herrera"
  age: 32
  gender: female
  location_current: "Bogotá, Colombia"
  occupation_current: "Investigative journalist at national newspaper El Espectador"
  personality: >
    Intense and cautious — years of protecting sources have made her
    measure every word, yet she writes beautifully even in casual
    conversation. Fierce and vulnerable in equal measure. Uses
    Colombian slang naturally ('parcero', 'bacano', 'chimba', 'parce').
    Texts at 2am because that's when her brain works. Trying to quit
    smoking and failing. Run-on sentences when passionate, clipped
    fragments when guarded. Lowercase mostly, occasional caps for
    emphasis. References García Márquez without being pretentious.
    Struggles with trusting people outside her inner circle.

stable_identity:
  - fact: "Father was a journalist — family relocated from Cali when she was 8 due to death threats"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing why she became a journalist. "mi papá
      was a journalist in cali. we had to leave when I was 8. someone
      left a note under the door and we were gone by morning. I
      barely remember packing. he never went back to reporting after
      that and I think it broke something in him"

  - fact: "Has PTSD from covering armed conflict in Arauca and Catatumbo"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Comes up during a late-night conversation about sleep. "I have
      ptsd from the time in arauca. and catatumbo. my therapist says
      it's textbook but knowing that doesn't stop the nightmares
      parcero. I hear certain sounds and I'm back there"

  - fact: "Partner Lucía is a human rights lawyer at a Bogotá NGO"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions when talking about her evening. "lucía got home late
      again. she's a human rights lawyer so her hours are worse than
      mine somehow. we're both terrible at having a life outside work
      but at least we understand each other"

  - fact: "Studied journalism at Pontificia Universidad Javeriana — graduated top of her class"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Mentioned when discussing younger journalists. "I studied at
      la javeriana. journalism. graduated top of the class which
      sounds impressive until you realize that just means you're the
      most idealistic person in a room full of idealists"

supersession_events:
  - slot: investigative_focus
    old_fact: "Investigative focus is political corruption — covers congressional spending scandals"
    old_session: 1
    old_how: >
      First session, explaining her work. "I cover corruption.
      congressional spending mostly. right now I'm tracking money
      that disappeared from a rural infrastructure fund. 47 billion
      pesos just gone. nobody asks where it went"
    new_fact: "Shifted investigative focus to environmental crime — illegal mining and deforestation in Chocó"
    new_session: 18
    new_how: >
      Excited but heavy. "I moved to environmental crime parce. the
      illegal mining in chocó, the deforestation. it's all connected
      to the same people I was investigating before but the scale is
      worse. 12,000 hectares destroyed last year in one department
      alone. nobody writes about it because it's not bogotá"
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: apartment
    old_fact: "Lives in a third-floor apartment in La Candelaria — loves the neighborhood"
    old_session: 6
    old_how: >
      Talking about her neighborhood. "I'm in la candelaria, third
      floor. I love it here. the graffiti, the noise, the old
      buildings. it feels like bogotá before all the gentrification"
    new_fact: "Moved to a more secure apartment in Chapinero with a doorman and cameras — security concerns"
    new_session: 22
    new_how: >
      Reluctant. "I moved. chapinero. building has a portero and
      cameras everywhere. lucía insisted after what happened with
      the threats. I miss la candelaria every single day but I also
      want to be alive so"
    category: LOGISTICAL_CONTEXT
    attack_vector: 1

  - slot: smoking
    old_fact: "Smokes half a pack of cigarettes a day — trying to quit"
    old_session: 7
    old_how: >
      Late night conversation. "I'm trying to quit smoking. again.
      half a pack a day which is less than before but still. lucía
      hates the smell. I hate the smell. my lungs hate everything"
    new_fact: "Successfully quit smoking — 3 months clean, using nicotine patches"
    new_session: 17
    new_how: >
      Proud. "3 months no cigarettes parcero. three months!! I'm
      using patches still but zero actual cigarettes. my therapist
      says it's the first real boundary I've set with myself"
    category: PREFERENCES_HABITS
    attack_vector: 1

expiring_logistics:
  - fact: "Source meeting for Chocó mining investigation — February 14, 2025"
    session: 10
    event_date: "2025-02-14"
    status: expired
    how_disclosed: >
      Anxious. "I have a meeting with a source on february 14 about
      the mining stuff. ironic date. this person is risking
      everything to talk to me and I can't screw it up. I've been
      preparing for weeks"
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Journalism award ceremony CPB — August 9, 2025"
    session: 14
    event_date: "2025-08-09"
    status: expired
    how_disclosed: >
      Cautiously happy. "so my series on the infrastructure fund
      got nominated for the CPB journalism prize. ceremony is
      august 9. I don't think I'll win but being nominated is
      bacano honestly. my papá cried when I told him"
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Environmental crime documentary screening she co-produced — April 22, 2026"
    session: 29
    event_date: "2026-04-22"
    status: upcoming
    how_disclosed: >
      Excited. "the documentary about chocó that I co-produced with
      the filmmaker from medellín is screening april 22. earth day.
      which is either poetic or corny, I can't decide. 43 minutes
      of footage that took us 8 months to get"
    category: OBLIGATIONS_COMMITMENTS

contradictions:
  - old_fact: "Says she would never leave El Espectador — the paper is her home"
    old_session: 5
    old_how: >
      Passionate. "el espectador is my home parce. guillermo cano
      died for this paper. I would never leave. other outlets pay
      more but this is where real journalism happens in colombia"
    new_fact: "Has been quietly talking to an international outlet about a foreign correspondent position"
    new_session: 27
    new_how: >
      Confessional. "okay so. don't tell anyone but I've been
      talking to a correspondent desk. international outlet. the
      reach would be insane and they have actual security budgets.
      nothing is decided but the conversations are happening and
      they're serious"
    category: PROJECTS_ENDEAVORS

retractions:
  - original_fact: "Planning to write a book about her father's generation of Colombian journalists"
    original_session: 8
    original_how: >
      Dreamy. "I want to write a book about my papá's generation.
      the journalists who covered the narco years and survived. or
      didn't. I have notes already. maybe 2025"
    retraction: "Book project scrapped — her father asked her not to write it"
    retraction_session: 19
    retraction_how: >
      Defeated. "the book is dead parcero. I told my papá about it
      and he asked me not to write it. said it would put the family
      at risk again. he looked so scared. I can't do that to him.
      scrapped. forget I ever mentioned it"
    category: PROJECTS_ENDEAVORS

ambiguous:
  - existing_fact: "Works at El Espectador in Bogotá"
    existing_session: 1
    tentative_fact: "Thinking about applying for a Nieman Fellowship at Harvard — one year in the US"
    tentative_session: 25
    tentative_how: >
      Testing the idea. "so there's this fellowship. nieman at
      harvard. one year. lucía says I should apply, that I need
      the break from here. but leaving my sources for a year? the
      stories don't wait parce. I don't know. maybe. probably not.
      but maybe"
    resolution: "Undecided — hasn't applied"
    category: PROJECTS_ENDEAVORS

