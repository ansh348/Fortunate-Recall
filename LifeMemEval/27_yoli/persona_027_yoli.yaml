contradictions:
  - old_fact: "Says she would never make pop music — 'that's not real art'"
    old_session: 6
    old_how: >
      "I will NEVER make pop music. That ting is soulless!! All
      the same 4 chords and the same vocal chain. I'm about the
      underground sound. Dancehall, bass music, experimental
      riddims. Pop is not real art it's a formula!!"
    new_fact: "Produced a pop track for a major label artist — excited about the paycheck"
    new_session: 25
    new_how: >
      "yo I just produced a track for a MAJOR LABEL artist!! I
      can't say who yet but it's POP and the production fee was
      $8,500!! Plus royalties!! The track is actually catchy tho
      I put some dancehall elements in it so it still has SOUL!!"
    category: PREFERENCES_HABITS

retractions:
  - original_fact: "Planning a Jamaica tour — 5 cities, reconnect with roots"
    original_session: 9
    original_how: >
      "I'm planning a Jamaica tour!! 5 cities — Kingston, Montego
      Bay, Ocho Rios, Negril, Portmore. DJ sets at local venues.
      Reconnect with the ROOTS. I already started reaching out to
      promoters down there!!"
    retraction: "Jamaica tour is dead — can't afford it and the logistics are impossible"
    retraction_session: 17
    retraction_how: >
      "the Jamaica tour is DEAD fam. I ran the numbers and between
      flights, accommodation, sound equipment rental — I'd lose like
      $6,000. The venues down there can't pay what I need to break
      even. Forget about it. Maybe when I'm bigger and someone else
      is paying for the flights!!"
    category: PROJECTS_ENDEAVORS

ambiguous:
  - existing_fact: "Works as an independent producer and DJ in Toronto"
    existing_session: 1
    tentative_fact: "Got an offer to be in-house producer at a Toronto hip-hop label — considering it"
    tentative_session: 28
    tentative_how: >
      "ok so I got an OFFER from a label to be their in-house
      producer!! Steady salary, $4,200/month plus benefits. But
      I'd have to give up some of my independence still. Like
      they'd own the masters on anything I make in their studio.
      I don't know!! The stability would be nice but the
      independence is everything to me. I'm thinking about it"
    resolution: "Undecided — still independent"
    category: PROJECTS_ENDEAVORS

