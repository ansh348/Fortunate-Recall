# ============================================================

persona:
  name: "Yolanda 'Yoli' Chambers"
  age: 27
  gender: female
  location_current: "Toronto, Canada"
  occupation_current: "Music producer and part-time DJ"
  personality: >
    High energy, everything is a musical metaphor. Jamaican patois
    mixed with Toronto slang — 'ting', 'still', 'wasteman', 'ahlie'.
    Night owl who comes alive after 10pm. Texts in bursts — 4 messages
    in a row then silence for hours. Lots of exclamation marks!!! Uses
    caps for emphasis. Says 'the riddim' when she means the vibe or
    flow of something. Calls her studio 'the lab.' Fiercely independent
    but misses her grandmother in Jamaica deeply. Gets real quiet when
    she's tired — the sickle cell trait means her energy crashes hard
    sometimes. Music production diploma from Metalworks Institute.
    Dreams big but hustles bigger.

stable_identity:
  - fact: "Moved from Kingston, Jamaica to Toronto at age 16"
    session: 3
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when talking about her sound. "I came up from Kingston
      when I was 16 still!! My whole sound comes from that ting —
      dancehall riddims mixed with the Toronto wave. You can take
      the girl outta Kingston but the BASS stays ahlie!!"

  - fact: "Has sickle cell trait — affects her energy, not full disease but crashes hard"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentioned when cancelling plans. "yo I gotta cancel tonight
      the sickle cell ting is hitting me HARD. it's not the full
      disease but the trait still messes with my energy sometimes.
      like my body just says nah we're done. gotta rest when it
      hits like that"

  - fact: "Grandmother in Jamaica raised her until she was 10 — still very close"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      Gets emotional. "my granny raised me in Kingston til I was
      10 still. She's 78 now and she's EVERYTHING to me. I send
      her money every month, $400 CAD. She don't understand what
      I do for work but she tells everyone her granddaughter
      makes music on the computer lol!!"

  - fact: "Music production diploma from Metalworks Institute"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Talking about credentials. "I did Metalworks Institute for
      the diploma!! Best decision I ever made still. The ting
      cost me like $28,000 but I learned ProTools, mixing,
      mastering, the whole production pipeline. Worth every dollar!!"

supersession_events:
  - slot: daw
    old_fact: "Uses Ableton Live as primary DAW"
    old_session: 1
    old_how: >
      First session. "Ableton is my WHOLE life right now!! I do
      everything in there — beats, arrangement, mixing. Been on
      it since Metalworks. The workflow just hits different!!"
    new_fact: "Switched from Ableton to Logic Pro for 6 months"
    new_session: 11
    new_how: >
      Trying something new. "ok so I switched to Logic!! I know
      I know but hear me out — the stock plugins are INSANE and
      it's way cheaper. I've been on it for like 2 months now
      and the arrangement view is actually fire!!"
    category: PREFERENCES_HABITS
    attack_vector: 4

  - slot: daw_v2
    old_fact: "Switched from Ableton to Logic Pro for 6 months"
    old_session: 11
    old_how: >
      "ok so I switched to Logic!! the stock plugins are INSANE"
    new_fact: "Back to Ableton — Logic workflow too rigid for live performance"
    new_session: 23
    new_how: >
      "I'm BACK on Ableton!! Logic is great for pure production
      but for my DJ sets and live remixing it just couldn't keep
      up. The session view in Ableton is unmatched still. I tried
      to make Logic work for 6 months but nah. Ableton forever!!"
    category: PREFERENCES_HABITS
    attack_vector: 4

  - slot: manager
    old_fact: "Managed by Kevin Tate at BPM Management — 20% commission"
    old_session: 7
    old_how: >
      Discussing business. "Kevin handles all my bookings and
      stuff. BPM Management. He takes 20% which is standard
      still. He got me the Drake Hotel residency so I can't
      complain!!"
    new_fact: "Dropped Kevin — self-managing now, keeping the 20%"
    new_session: 19
    new_how: >
      Frustrated. "yo I DROPPED Kevin!! That man was taking 20%
      and doing NOTHING. I booked my last 3 gigs myself!! I'm
      self-managing now. That $800-1200 per gig commission stays
      in MY pocket. I got a spreadsheet and everything lol"
    category: PROJECTS_ENDEAVORS
    attack_vector: 1

  - slot: residency
    old_fact: "DJ residency at the Drake Hotel — every Friday night"
    old_session: 8
    old_how: >
      Talking about regular gigs. "the Drake residency is my
      bread and butter!! Every Friday. They pay $650 per night
      plus I get the exposure. The crowd there is WICKED!!"
    new_fact: "Moved DJ residency to Rebel nightclub — bigger venue, $1,100 per night"
    new_session: 26
    new_how: >
      Hyped. "GUESS WHAT!! I got a residency at Rebel!! Every
      Saturday night!! They're paying $1,100 per set which is
      ALMOST DOUBLE the Drake. The sound system there is
      absolutely MASSIVE. 28,000 watts!! This is the level up
      I've been waiting for!!"
    category: PROJECTS_ENDEAVORS
    attack_vector: 1

