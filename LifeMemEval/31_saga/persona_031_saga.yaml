contradictions:
  - old_fact: "Says she thrives on data-driven decisions and never acts on emotion"
    old_session: 5
    old_how: >
      Declarative. "I make decisions based on data, always.
      emotional decisions have a much higher regret rate,
      somewhere around 40% based on what I have read. I
      track my major decisions and their outcomes. data
      is the only reliable framework"
    new_fact: "Ended her relationship with Anders partly on gut feeling — 'something just felt wrong'"
    new_session: 25
    new_how: >
      Reflective. "with Anders it was not any single thing.
      the data said it was fine — we were compatible on
      paper, low conflict frequency, aligned life goals.
      but something just felt wrong. I could not quantify
      it. maybe some things are not meant to be measured"
    category: IDENTITY_SELF_CONCEPT

retractions:
  - original_fact: "Planning to apply for a senior analyst role at Klarna"
    original_session: 11
    original_how: >
      Strategic. "I am considering Klarna. their data team
      is doing interesting work in credit risk modelling.
      the senior analyst role pays approximately 15% more
      than Spotify and the equity package is better. I plan
      to apply by end of Q1"
    retraction: "Klarna application scrapped — team restructure at Spotify made the new role more interesting"
    retraction_session: 19
    retraction_how: >
      Decisive. "the Klarna thing is dead. after the
      restructure I ended up on music recommendations which
      is actually more interesting algorithmically than
      anything Klarna is doing. the probability of me
      leaving Spotify dropped from 65% to approximately 12%.
      scrapped the whole plan"
    category: PROJECTS_ENDEAVORS

ambiguous:
  - existing_fact: "Lives in Stockholm — 15-minute bike to Spotify HQ"
    existing_session: 1
    tentative_fact: "Thinking about spending 3 months in Gothenburg to be near Erik and his new family"
    tentative_session: 27
    tentative_how: >
      Exploring. "Spotify allows remote work for up to 3
      months per year. I have been thinking about spending
      that time in Gothenburg near Erik. he and Sara are
      expecting a baby in November and the idea of being
      near them is appealing. but my climbing gym, Maja,
      my apartment — it is a lot to leave temporarily.
      I am running the numbers but this is not a numbers
      decision"
    resolution: "Undecided — still full-time in Stockholm"
    category: LOGISTICAL_CONTEXT

