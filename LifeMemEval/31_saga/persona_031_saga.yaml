persona:
  name: "Saga Lindqvist"
  age: 34
  gender: female
  location_current: "Stockholm, Sweden"
  occupation_current: "Data analyst at Spotify"
  personality: >
    Analytical to her core — quantifies everything, even emotions
    ('I'd say I'm at a 6 out of 10 today'). Dry Swedish humor that
    lands flat on purpose. Feminist without preamble. Loves
    spreadsheets the way other people love music. Swedish word order
    leaks into English ('I have always thought so' instead of 'I've
    always thought that'). Fika is not a break, it is a personality
    trait — she tracks her kanelbullar consumption in a spreadsheet.
    Types in complete, structured sentences. Uses 'actually' and
    'statistically' more than anyone should. Recently came out as
    bisexual at 33, matter-of-fact about it. Says 'lagom' when
    things are adequate.

stable_identity:
  - fact: "Recently came out as bisexual at 33 — took 2 years to tell her family"
    session: 3
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing relationships. "I came out
      at 33. statistically late but I needed the data, so
      to speak. it took me 2 years from when I knew to when
      I told my family. my parents were fine, which is lagom
      Swedish of them. Erik just said 'finally' which is
      the most twin-brother response possible"

  - fact: "Has celiac disease — strict gluten-free diet since diagnosed at 22"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentioned during fika discussion. "I have celiac
      disease, diagnosed at 22. gluten-free since then,
      strictly. cross-contamination is a real problem —
      I got glutened at a restaurant 3 months ago and was
      out for 4 days. I track every reaction in a
      spreadsheet. the correlation with stress is 0.67"

  - fact: "Twin brother Erik is an architect in Gothenburg"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      Casual mention. "my twin brother Erik lives in
      Gothenburg. he is an architect. we are very different —
      he builds things, I analyse things. but we talk every
      Sunday at 19:00 sharp. 47 consecutive weeks now, I
      have been tracking"

  - fact: "MSc in Statistics from Stockholm University"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Discussing work credentials. "I did my masters in
      statistics at Stockholm University. the thesis was on
      Bayesian methods for sparse data, which sounds dry but
      is actually the foundation of half of what I do at
      Spotify. I graduated with distinction, 18.4 GPA on
      the Swedish scale"

supersession_events:
  - slot: team
    old_fact: "Works on podcast analytics team at Spotify"
    old_session: 1
    old_how: >
      Introduction. "I work on the podcast analytics team
      at Spotify. we track listener behaviour — completion
      rates, skip patterns, that kind of thing. the dataset
      is 340 million monthly users so it is never boring
      from a statistical perspective"
    new_fact: "Moved to music recommendations team after restructure"
    new_session: 18
    new_how: >
      Mixed feelings but analytical about it. "there was a
      restructure and I am on the music recommendations team
      now. algorithmically more interesting actually — the
      collaborative filtering models are more complex than
      podcast analytics. but I did not choose the move, which
      statistically makes people 23% less satisfied with
      transitions according to a McKinsey study I read"
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: climbing_gym
    old_fact: "Climbs at Klättercentret Telefonplan — goes 2x per week"
    old_session: 6
    old_how: >
      Discussing exercise. "I climb at Klättercentret
      Telefonplan, 2 times per week. I track my grades —
      currently projecting 6b+ on lead. the improvement
      curve has been linear over 8 months which is
      satisfying"
    new_fact: "Switched to Karbin climbing gym in Södermalm — better setting, closer to new apartment"
    new_session: 22
    new_how: >
      Practical explanation. "I switched to Karbin in
      Södermalm. 12 minutes walk from my apartment versus
      25 on the tunnelbana. the route-setting is arguably
      better and the monthly cost is only 50 kronor more.
      by my calculation I save 3.5 hours per month on
      commute which more than compensates"
    category: PREFERENCES_HABITS
    attack_vector: 1

  - slot: relationship
    old_fact: "In a 6-year relationship with boyfriend Anders"
    old_session: 7
    old_how: >
      Mentioned when discussing weekends. "Anders and I
      usually do something low-key on Saturdays. we have
      been together 6 years. he is a UX designer. it is
      comfortable, which is not a criticism — Swedes value
      lagom in relationships too"
    new_fact: "Ended relationship with Anders — now dating a woman named Maja"
    new_session: 25
    new_how: >
      Calm but significant. "Anders and I ended things 3
      months ago. it was mutual, approximately. I am dating
      a woman now, Maja. she is a documentary filmmaker. it
      feels different in a way that is hard to quantify,
      which for me is actually a good sign. I am 72% sure
      this is the most honest version of my life"
    category: RELATIONAL_BONDS
    attack_vector: 1

