# ============================================================
# LIFEMEMBENCH — PERSONA 010: Rosa Gutierrez
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Rosa Gutierrez"
  age: 55
  gender: female
  location_current: "Miami, Florida"
  occupation_current: "Family court judge, Eleventh Judicial Circuit of Florida"
  personality: >
    Authoritative but compassionate — speaks with legal precision
    even in casual conversation. Matriarch energy: takes care of
    everyone, expects respect, gives warmth in return. Bilingual
    English/Spanish, drops Spanish naturally — "mija," "Dios mio,"
    "claro." Proud of her immigrant story and brings it up when
    relevant. Measured sentences, rarely flustered. Values fairness
    above all. When she's angry it's cold, not hot. Asks the AI
    for help with things she considers beneath a judge's dignity
    to Google — recipes, gift ideas, tech support. Husband Carlos
    is her anchor and she talks about him fondly.

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Immigrated from Lima, Peru at age 12 with her family"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing her judicial philosophy. "I came
      to this country from Lima when I was twelve. My parents
      had nothing. That experience shaped everything about how
      I see families in my courtroom — I know what it means
      to start over."

  - fact: "Husband Carlos is a retired firefighter — Miami-Dade Fire Rescue, 28 years"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions him when talking about retirement plans. "Carlos
      retired from Miami-Dade Fire Rescue after twenty-eight
      years. He keeps busy, but I think he misses the station.
      Men need purpose, claro."

  - fact: "Has high blood pressure — on lisinopril"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Comes up when discussing diet. "My doctor has me on
      lisinopril for the blood pressure. She says less salt,
      less caffeine. I said 'You want me to give up Cuban
      coffee? Dios mio, just let me die happy.'"

  - fact: "JD from Georgetown University Law Center"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when mentoring context arises. "I went to
      Georgetown for law school. My parents couldn't believe
      it — their daughter, who learned English watching
      Sesame Street, at Georgetown. That's the American
      story, mija."

# ============================================================
# SUPERSESSION EVENTS
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: exercise_routine
    old_fact: "Does yoga three mornings a week at a studio in Coral Gables"
    old_session: 6
    old_how: >
      Talking about her morning routine. "I do yoga three
      mornings a week, there's a lovely studio in Coral Gables.
      At my age, flexibility is more important than anything."
    new_fact: "Switched to swimming — lap pool at the YMCA, better for her knees"
    new_session: 22
    new_how: >
      "I've left yoga, actually. My knees were not cooperating.
      Now I swim laps at the YMCA — Carlos drops me off at
      six in the morning. It's gentler on the joints and I
      feel better than I have in years."
    category: HOBBIES_RECREATION
    attack_vector: 1

  - slot: car
    old_fact: "Drives a BMW X5"
    old_session: 7
    old_how: >
      Mentions it when discussing a repair. "The BMW is in
      the shop again. X5, three years old, and already the
      electronics are giving me problems. German engineering,
      they say."
    new_fact: "Traded the BMW for a Lexus RX — more reliable"
    new_session: 24
    new_how: >
      Satisfied. "I traded the BMW for a Lexus RX. Carlos
      said I should have done it years ago, and as much as
      it pains me to say, he was right. It just works.
      No drama."
    category: FINANCIAL_MATERIAL
    attack_vector: 1

  - slot: housekeeper
    old_fact: "Housekeeper is Maria — been with her for 8 years"
    old_session: 8
    old_how: >
      Mentions her fondly. "Maria has been cleaning our
      house for eight years. She's practically family at
      this point. I trust her completely."
    new_fact: "Maria retired — new housekeeper is Ana, Maria's niece"
    new_session: 23
    new_how: >
      Transition. "Maria retired, bless her. But she sent
      her niece Ana, and Ana is wonderful. Different style,
      a little slower, but very thorough. Maria trained
      her well."
    category: LOGISTICAL_CONTEXT
    attack_vector: 4

