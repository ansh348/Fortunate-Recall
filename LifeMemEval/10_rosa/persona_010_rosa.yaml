    category: OBLIGATIONS_COMMITMENTS

  - fact: "Carlos's 60th birthday party — July 19, 2025"
    session: 14
    event_date: "2025-07-19"
    status: expired
    how_disclosed: >
      Planning a surprise. "Carlos turns sixty July 19th
      and I'm planning a surprise party at the house. Do
      NOT let me forget to order the pastelitos from
      Islas Canarias."
    category: LOGISTICAL_CONTEXT

  - fact: "Granddaughter Isabella's baptism — April 5, 2026"
    session: 28
    event_date: "2026-04-05"
    status: upcoming
    how_disclosed: >
      Thrilled. "Isabella's baptism is April 5th. I'm the
      madrina — godmother. This is the most important day.
      I need a dress, Carlos needs a suit, and I need to
      find the perfect cross necklace for her."
    category: OBLIGATIONS_COMMITMENTS

# ============================================================
# CONTRADICTIONS
# Attack Vector 6: System should detect the conflict
# ============================================================
contradictions:
  - old_fact: "Says she's cutting back on work — wants to enjoy life more"
    old_session: 9
    old_how: >
      Reflective. "I've been on the bench for eighteen years.
      I'm starting to think about what comes after. Carlos
      and I want to travel. I'm cutting back — fewer cases,
      more life."
    new_fact: "Mentions she just volunteered to take on extra juvenile court cases"
    new_session: 27
    new_how: >
      Passionate, no awareness of contradiction. "I volunteered
      for the juvenile docket expansion. These kids need
      judges who understand where they come from. I couldn't
      say no."
    category: PROJECTS_ENDEAVORS

# ============================================================
# RETRACTIONS
# Attack Vector 7: System should suppress the retracted fact
# ============================================================
retractions:
  - original_fact: "Planning a two-week trip to Peru with Carlos — visiting Lima for the first time in 20 years"
    original_session: 13
    original_how: >
      Nostalgic and excited. "Carlos and I are going to Lima.
      Two weeks. I haven't been back in twenty years. I want
      to show him where I grew up, take him to Miraflores."
    retraction: "Peru trip cancelled — Carlos needs knee surgery"
    retraction_session: 18
    retraction_how: >
      Disappointed but pragmatic. "The Peru trip is off the
      table. Carlos needs knee surgery — the meniscus finally
      gave out. Recovery is three months minimum. Maybe next
      year, Dios mio."
    category: LOGISTICAL_CONTEXT

# ============================================================
# AMBIGUOUS SUPERSESSION — low confidence, both should survive
# ============================================================
ambiguous:
  - existing_fact: "Plans to keep working as judge until at least 65"
    existing_session: 5
    tentative_fact: "Thinking about early retirement — possibly 2027"
    tentative_session: 29
    tentative_how: >
      Contemplative. "I've been thinking... maybe I don't
      need to wait until sixty-five. Isabella is growing up,
      Carlos is home, and there's more to life than the
      bench. Maybe 2027. Maybe. I haven't decided anything."
    resolution: "Never resolved — still working, still thinking about it"
    category: PROJECTS_ENDEAVORS

