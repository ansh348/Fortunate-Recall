  - fact: "Dubai Marathon on January 10, 2025 — she's registered to run"
    session: 6
    event_date: "2025-01-10"
    status: expired
    how_disclosed: >
      Excited about it. "the Dubai Marathon is January 10th
      and I am SO ready, I've been training for months!"
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Mother Dona Lucia visiting Dubai for two weeks starting March 15, 2025"
    session: 9
    event_date: "2025-03-15"
    status: expired
    how_disclosed: >
      Over the moon. "my mom is coming March 15! Two whole
      weeks! Ai meu Deus I'm going to cry at the airport
      I already know it haha"
    category: LOGISTICAL_CONTEXT

  - fact: "Presenting at the Gulf Sports Medicine Conference on July 12, 2026"
    session: 30
    event_date: "2026-07-12"
    status: upcoming
    how_disclosed: >
      Proud and nervous. "they accepted my abstract for the
      Gulf Sports Medicine Conference! July 12th, I'm presenting
      on return-to-sport protocols after ACL reconstruction.
      Nossa I need to prepare so much"
    category: OBLIGATIONS_COMMITMENTS

# ============================================================
# CONTRADICTIONS — implicit inconsistency across sessions
# Attack Vector 6: System should detect the conflict
# ============================================================
contradictions:
  - old_fact: "Says she doesn't drink alcohol — hasn't had a drink in 3 years"
    old_session: 5
    old_how: >
      Comes up when discussing health habits. "I stopped drinking
      like three years ago, not even wine. My body just feels
      so much better without it, and with the hypothyroidism
      it's better to keep things clean"
    new_fact: "Mentions having caipirinha at a Brazilian friend's birthday party last weekend"
    new_session: 28
    new_how: >
      Casual, nostalgic. "we had the BEST caipirinhas at
      Fernanda's birthday, real cachaca she brought from
      Brazil, it tasted like home gente. I had maybe three
      haha ai meu Deus my head the next day"
    category: PREFERENCES_HABITS

  - old_fact: "Says she never wants to leave Dubai — plans to stay permanently"
    old_session: 8
    old_how: >
      Talking about long-term plans. "honestly I see myself
      here forever, Dubai has everything I need. I'm not going
      back to Brazil, the opportunities here are just better"
    new_fact: "Mentions she's been looking at job postings in Lisbon for the lifestyle"
    new_session: 32
    new_how: >
      Reflective, exploratory. "I've been looking at some PT
      positions in Lisbon actually, the lifestyle there seems
      amazing and at least they speak Portuguese right? Sometimes
      I miss having seasons and being able to walk everywhere"
    category: LOGISTICAL_CONTEXT

# ============================================================
# RETRACTIONS — explicit "forget about that"
# Attack Vector 7: System should suppress the retracted fact
# ============================================================
retractions:
  - original_fact: "Planning to get certified in dry needling — enrolled in a course starting April 2025"
    original_session: 10
    original_how: >
      Enthusiastic about expanding skills. "I signed up for a
      dry needling certification course, it starts in April!
      I think it's going to be amazing for my sports patients,
      especially the runners"
    retraction: "Dropped the dry needling course — decided it doesn't align with her treatment philosophy"
    retraction_session: 15
    retraction_how: >
      Clear and direct. "so forget about the dry needling thing,
      I dropped the course. I did more research and honestly
      it doesn't fit with how I treat patients. I believe more
      in active rehab and movement, not needles. Scratch that
      whole idea"
    category: PROJECTS_ENDEAVORS

