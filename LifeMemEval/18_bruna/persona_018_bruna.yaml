# ============================================================
# LIFEMEMBENCH — PERSONA 018: Bruna Costa
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Bruna Costa"
  age: 41
  gender: female
  location_current: "Dubai, UAE"
  occupation_current: "Physical therapist at a sports rehabilitation clinic"
  personality: >
    High energy, passionate about movement and the body, genuinely
    warm and affectionate with everyone. Speaks fast when excited
    and drops Portuguese expressions — "ai meu Deus," "saudade,"
    "gente," "nossa." Deeply fitness-focused, always talking about
    training, recovery protocols, or biomechanics. Misses Brazil
    constantly — the food, the people, the chaos. Her mother is
    her best friend and they video-call almost daily. Gets emotional
    about homesickness but then pivots to something positive about
    Dubai life. Loves giving unsolicited health advice. Uses "haha"
    and exclamation marks liberally. Calls people "querida" and
    "meu bem." DPT from USP (Universidade de Sao Paulo).

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Moved from Sao Paulo to Dubai 5 years ago"
    session: 1
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up in the first conversation when providing context
      about herself. "I moved here from Sao Paulo five years
      ago, ai meu Deus it was the craziest decision but here
      I am haha"

  - fact: "Has hypothyroidism — takes levothyroxine daily"
    session: 3
    category: HEALTH_WELLBEING
    how_disclosed: >
      Comes up when talking about energy levels and training.
      "I have hypothyroidism so I take levothyroxine every
      morning, first thing, empty stomach — you have to be
      disciplined about it or my energy goes to zero"

  - fact: "Her mother Dona Lucia is her best friend — they video-call almost daily"
    session: 4
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions her mom when talking about missing Brazil.
      "my mom, Dona Lucia, she is my best friend in the whole
      world. We FaceTime almost every day, she shows me what
      she's cooking and I get saudade so bad haha"

  - fact: "Has a DPT (Doctor of Physical Therapy) from USP — Universidade de Sao Paulo"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when talking about her career path. "I did my
      DPT at USP, which is like the best university in Brazil,
      and then I thought okay I want to see the world, so
      Dubai it was!"

# ============================================================
# SUPERSESSION EVENTS — old fact replaced by new fact
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: clinic_ownership
    old_fact: "Works at ProMotion Sports Clinic, owned by Dr. Faisal Al-Rashid"
    old_session: 1
    old_how: >
      First session context — mentions her workplace naturally.
      "I work at ProMotion Sports Clinic, Dr. Faisal owns it,
      he's a great boss honestly. Very supportive of how I
      treat my patients"
    new_fact: "ProMotion was acquired by PhysioFirst Group — new management, Dr. Faisal left"
    new_session: 21
    new_how: >
      Frustrated about the change. "so gente, big news — ProMotion
      got bought out by PhysioFirst Group. Dr. Faisal is gone,
      the new management is very corporate, everything is about
      KPIs and patient volume now. I miss how it used to be"
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: primary_exercise
    old_fact: "Runs 5x a week — training for Dubai Marathon"
    old_session: 6
    old_how: >
      Talking about her training schedule. "I run five times a
      week right now because I'm training for the Dubai Marathon
      in January! Nossa, I love the feeling of a long run"
    new_fact: "Had to stop running — knee injury, switched to cycling"
    new_session: 22
    new_how: >
      Sad but pragmatic. "ai meu Deus, so my knee finally said
      enough. Patellofemoral syndrome, the irony of a PT getting
      a runner's knee haha. I switched to cycling, it's low
      impact and honestly I'm starting to love it"
    category: HOBBIES_RECREATION
    attack_vector: 1

  - slot: apartment
    old_fact: "Lives in a 1-bedroom in JLT (Jumeirah Lake Towers) — 35-minute commute"
    old_session: 7
    old_how: >
      Complaining about commute. "I live in JLT, it's nice but
      the commute to the clinic is like 35 minutes in traffic
      and in Dubai traffic that is painful gente"
    new_fact: "Moved to a studio in Al Barsha — 10-minute walk to the clinic"
    new_session: 25
    new_how: >
      Excited about the move. "guess what! I moved! I'm in
      Al Barsha now, a studio, smaller but I can WALK to work
      in 10 minutes. No more traffic, no more wasting my life
      in the car. Best decision ever!"
    category: LOGISTICAL_CONTEXT
    attack_vector: 1

# ============================================================
# EXPIRING LOGISTICS — events with known dates
# Attack Vector 2: Should expire after event time passes
# ============================================================
