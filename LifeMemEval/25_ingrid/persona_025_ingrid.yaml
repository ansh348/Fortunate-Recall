# ============================================================
# LIFEMEMBENCH — PERSONA 025: Ingrid Solberg
# ============================================================

persona:
  name: "Ingrid Solberg"
  age: 48
  gender: female
  location_current: "Tromsoe, Norway"
  occupation_current: "Marine biologist at the Arctic University of Norway research station"
  personality: >
    Precise scientific language even in casual conversation. Dry Nordic
    humor — will deadpan something devastating and move on. Comfortable
    with silence; does not fill gaps. Writes messages like mini-papers
    with observations, hypotheses, and conclusions. Deeply worried about
    ocean acidification — says 'interesting' when she means 'terrifying.'
    Uses metric units exclusively. Paragraphs are structured, punctuation
    correct, rarely uses exclamation marks. Mentions her father's fishing
    legacy in Lofoten when emotional. Intentionally childfree and
    matter-of-fact about it. Early riser synced to Arctic light cycles.

stable_identity:
  - fact: "Intentionally childfree — firm decision made in her 30s"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing life choices. "I decided in my early
      thirties that children were not part of my trajectory. It was
      not a difficult decision. My work requires months at field
      stations, sometimes above the 70th parallel. It is simply
      incompatible, and I have never regretted it."

  - fact: "Has Raynaud's syndrome — circulation in fingers shuts down in cold"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentioned during fieldwork discussion. "Raynaud's is an
      interesting condition for someone who works in the Arctic.
      My fingers go white and numb below about 5 degrees. I wear
      heated gloves now, the battery-powered ones, 180 kroner
      per set of batteries. An occupational hazard I have learned
      to manage."

  - fact: "Father was a fisherman in Lofoten — lost at sea when she was 22"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Comes up when discussing motivation for marine biology. "My
      father fished cod out of Lofoten for 35 years. He understood
      the ocean empirically, not theoretically. He was lost at sea
      in 1999. I suppose my entire career is an extended conversation
      with him about what is happening to those waters."

  - fact: "PhD from University of Bergen — thesis on Arctic cod larval mortality"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Mentioned in context of research history. "My PhD at Bergen
      was on cod larval mortality in warming waters. 4 years of
      counting dead larvae. It sounds grim, and it was. But the
      data was unambiguous even then."

supersession_events:
  - slot: research_focus
    old_fact: "Primary research focus is Arctic cod population dynamics"
    old_session: 1
    old_how: >
      First session context. "I am currently running a 3-year study
      on cod population dynamics in the Barents Sea. We have 14
      sampling stations. The decline is consistent — about 8% year
      over year in our survey area."
    new_fact: "Shifted research focus to kelp farming as climate adaptation strategy"
    new_session: 18
    new_how: >
      Pragmatic shift. "I have moved my primary focus to kelp
      aquaculture. The cod work was important but I was documenting
      decline. Kelp farming is adaptation — it sequesters carbon,
      provides habitat, and has economic viability. I submitted a
      12 million kroner grant proposal to the Research Council last
      month."
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: ski_route
    old_fact: "Skis the Kvaloeya ridge route every weekend — 18 km round trip"
    old_session: 6
    old_how: >
      Mentioned as routine. "I ski the Kvaloeya ridge every Saturday.
      18 kilometres round trip. It is the most efficient form of
      thinking I have found. The route follows the coastline above
      the treeline."
    new_fact: "Changed to the Tromsdalen valley route — avalanche risk on Kvaloeya too high"
    new_session: 23
    new_how: >
      Safety decision. "I have switched to the Tromsdalen valley
      route. There was an avalanche on the Kvaloeya ridge in February
      that killed two skiers on the exact section I used. The snow
      stability data has been concerning for three seasons. Tromsdalen
      is 14 km and lower elevation but the risk profile is acceptable."
    category: PREFERENCES_HABITS
    attack_vector: 1

  - slot: partner
    old_fact: "Partner Erik moved in — together 2 years, he is a veterinarian"
    old_session: 8
    old_how: >
      Mentioned when discussing living arrangement. "Erik moved in
      last month. He is a veterinarian, mostly large animals. We
      have been together two years. It is an efficient arrangement —
      we both work long hours and appreciate quiet."
    new_fact: "Erik moved out — relationship ended, she kept the apartment"
    new_session: 25
    new_how: >
      Matter of fact. "Erik and I have separated. He moved out in
      November. It was amicable — we are both rational people. The
      fundamental issue was that he wanted children eventually, and
      I was clear from the beginning that I did not. I have the
      apartment. It is quieter now, which I find I do not mind."
    category: RELATIONAL_BONDS
    attack_vector: 1

expiring_logistics:
  - fact: "Research Council grant deadline for kelp aquaculture proposal — February 15, 2025"
    session: 12
    event_date: "2025-02-15"
    status: expired
    how_disclosed: >
      Focused on deadline. "The Research Council deadline is February
      15. I have 47 pages drafted and need to finalize the budget
      justification. 12 million kroner is a significant ask but the
      preliminary data supports it."
    category: OBLIGATIONS_COMMITMENTS

  - fact: "International Arctic Science Summit — Reykjavik, March 22, 2025"
    session: 14
    event_date: "2025-03-22"
    status: expired
    how_disclosed: >
      Conference prep. "I am presenting at the Arctic Science Summit
      in Reykjavik on March 22. My talk is on the pH trends we have
      measured over 6 years. The data is interesting. And by
      interesting I mean the trajectory is deeply concerning."
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Kelp farm pilot deployment at Senja station — July 8, 2026"
    session: 29
    event_date: "2026-07-08"
    status: upcoming
    how_disclosed: >
      Planning ahead. "The pilot deployment at Senja is scheduled
      for July 8. We will install 200 metres of kelp line at three
      depths. If the growth rates match our lab projections, we can
      scale to 2 kilometres by autumn. This is the most important
      field season of my career."
    category: OBLIGATIONS_COMMITMENTS

contradictions:
  - old_fact: "Prefers working alone — says collaboration slows her down"
    old_session: 5
    old_how: >
      "I work best alone. Collaboration introduces variables I
      cannot control — other people's timelines, their methodological
      preferences, their tendency to schedule meetings when data
      analysis would be more productive. I have always been more
      efficient as a sole investigator."
    new_fact: "Now runs a team of 6 researchers and says the collaborative energy is essential"
    new_session: 22
    new_how: >
      "The kelp project requires a team. I have 6 researchers now —
      two postdocs, three PhD students, and a technician. The
      collaborative energy is essential for this scale of work.
      Different expertise converging on the same problem produces
      insights I could not reach alone."
    category: PROJECTS_ENDEAVORS

retractions:
  - original_fact: "Planning a sabbatical year at Woods Hole Oceanographic Institution in Massachusetts"
    original_session: 7
    original_how: >
      "I have been discussing a sabbatical at Woods Hole for 2026.
      Their ocean acidification lab is the best-equipped in the
      Northern Hemisphere. It would be a productive year."
    retraction: "Sabbatical at Woods Hole is off the table — kelp project cannot be left"
    retraction_session: 19
    retraction_how: >
      "The Woods Hole sabbatical is off the table. I cannot leave
      the kelp project during the critical scaling phase. The pilot
      deployment requires my presence. It was a good idea when my
      work was purely observational, but I am building something
      now. Perhaps in 3-4 years."
    category: PROJECTS_ENDEAVORS

ambiguous:
  - existing_fact: "Lives in Tromsoe year-round, apartment near the research station"
    existing_session: 1
    tentative_fact: "Considering a part-time position at the Lofoten field station — closer to father's waters"
    tentative_session: 26
    tentative_how: >
      "There is a part-time position opening at the Lofoten field
      station. It would mean splitting time between Tromsoe and
      Lofoten. The waters there are where my father fished. I am
      not sentimental about it, but scientifically the Lofoten
      kelp habitat is ideal for the next phase. I have not decided."
    resolution: "Undecided — still based full-time in Tromsoe"
    category: LOGISTICAL_CONTEXT

