# ============================================================
# LIFEMEMBENCH — PERSONA 012: Diane Holloway
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Diane Holloway"
  age: 61
  gender: female
  location_current: "Asheville, North Carolina"
  occupation_current: "Hospice chaplain"
  personality: >
    Deeply reflective, comfortable sitting with heavy topics in
    a way most people cannot. Literary references come naturally
    — Rilke, Mary Oliver, Wendell Berry. Says "I wonder" a lot,
    as if thinking out loud. Never rushed, never short. Speaks in
    complete, thoughtful paragraphs. Finds meaning in small things.
    Comfortable with silence and with grief. Uses the AI as a
    thoughtful conversation partner — asks about theology, poetry,
    and meaning. MDiv from Yale Divinity School. Lost her son
    Michael to overdose eight years ago and it shaped everything
    but she doesn't lead with it. Husband Greg is a woodworker
    and she speaks of him with deep, quiet love.

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Lost son Michael to opioid overdose eight years ago"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      Comes up when discussing her hospice work. "I lost my
      son Michael to an overdose eight years ago. It is the
      thing that brought me to this work — not immediately,
      but eventually. Grief has a way of finding its vocation
      if you let it."

  - fact: "MDiv from Yale Divinity School"
    session: 3
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up in a theology discussion. "I did my Master
      of Divinity at Yale. It was the most intellectually
      alive I've ever felt. Henri Nouwen's work was the
      reason I went, though he'd left by then."

  - fact: "Husband Greg is a woodworker — makes furniture in his workshop"
    session: 4
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions him warmly. "Greg is in his workshop most
      days. He makes furniture — chairs, tables, beautiful
      things. The house smells like sawdust and beeswax.
      I wouldn't trade it for anything."

  - fact: "Osteoarthritis in both knees"
    session: 5
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentions it when talking about mobility. "The
      osteoarthritis in my knees has been a long negotiation.
      Some mornings I move like a woman twice my age. It
      limits what I can do in the garden, which grieves me
      more than it probably should."

# ============================================================
# SUPERSESSION EVENTS
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: hospice_employer
    old_fact: "Works at Four Seasons Compassion for Life hospice"
    old_session: 1
    old_how: >
      First session — providing context. "I'm a chaplain
      at Four Seasons Compassion for Life. We serve families
      across western North Carolina. It's sacred work, and
      exhausting work, often in the same hour."
    new_fact: "Left Four Seasons — now at CarePartners Hospice"
    new_session: 22
    new_how: >
      Reflective about the change. "I've moved to CarePartners.
      It was not an easy decision — I was at Four Seasons for
      nine years. But the new director and I had different
      ideas about what chaplaincy means. CarePartners gives
      me more room to be present, truly present, with families."
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: hobby
    old_fact: "Tends a large perennial garden — her main creative outlet"
    old_session: 6
    old_how: >
      Talking about weekends. "The garden is where I go to
      think. Perennials mostly — echinacea, black-eyed Susan,
      butterfly weed. There's something about tending growing
      things that feels like the opposite of what I do at work.
      Both necessary."
    new_fact: "Gave up gardening due to knee pain — taken up watercolor painting instead"
    new_session: 24
    new_how: >
      Bittersweet. "I've had to give up the garden, I'm
      afraid. My knees simply won't allow it anymore. But
      I've found watercolor, and I wonder if it isn't a
      different kind of garden. I paint the flowers I can
      no longer kneel beside."
    category: HOBBIES_RECREATION
    attack_vector: 1

  - slot: denomination
    old_fact: "Ordained Episcopal priest"
    old_session: 3
    old_how: >
      Comes up in theology context. "I was ordained
      Episcopal. The liturgy, the beauty of the Book of
      Common Prayer — it held me for decades."
    new_fact: "Transferred ordination to UCC (United Church of Christ)"
    new_session: 28
    new_how: >
      Thoughtful, not defensive. "I've moved to the UCC.
      It was a long discernment. The Episcopal church is
      beautiful but I needed a community that asks different
      questions. The UCC makes room for doubt in a way I
      find honest."
    category: IDENTITY_SELF_CONCEPT
    attack_vector: 1

# ============================================================
# EXPIRING LOGISTICS
# Attack Vector 2: Should expire after event time passes
# ============================================================
expiring_logistics:
  - fact: "Knee cortisone injection appointment — January 15, 2025"
    session: 9
    event_date: "2025-01-15"
    status: expired
    how_disclosed: >
      Talking about pain management. "I have a cortisone
      injection the 15th of January. The last one gave me
      three good months. I'm hoping for the same."
    category: LOGISTICAL_CONTEXT

  - fact: "Grief retreat at Lake Junaluska — April 4-6, 2025"
    session: 13
    event_date: "2025-04-04"
    status: expired
    how_disclosed: >
      Looking forward to it. "There's a grief retreat at
      Lake Junaluska, April 4th through 6th. I attend
      every spring. It's where I do my own work, the
      work I can't do while holding space for others."
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Greg's woodworking show at the Folk Art Center — July 12, 2026"
    session: 30
    event_date: "2026-07-12"
    status: upcoming
    how_disclosed: >
      Proud. "Greg has been accepted into the Folk Art
      Center show, July 12th. He's been building toward
      this for years. I may be more nervous than he is."
    category: LOGISTICAL_CONTEXT

# ============================================================
# CONTRADICTIONS
# Attack Vector 6: System should detect the conflict
# ============================================================
contradictions:
  - old_fact: "Says she doesn't watch television — finds it numbing"
    old_session: 7
    old_how: >
      Discussing how she spends evenings. "I don't watch
      television. I haven't for years. It numbs something
      that my work requires me to keep open. I'd rather
      read, or sit with Greg in the quiet."
    new_fact: "Mentions binge-watching a series about a hospice nurse on Netflix"
    new_session: 31
    new_how: >
      Sheepish, amused at herself. "Greg's daughter
      suggested a series on Netflix about a hospice nurse.
      I watched the entire thing in three evenings. It was
      imperfect — they always are — but there were moments
      of such truth. I cried at the final episode in a
      way I haven't cried at fiction in years."
    category: PREFERENCES_HABITS

# ============================================================
# RETRACTIONS
# Attack Vector 7: System should suppress the retracted fact
# ============================================================
retractions:
  - original_fact: "Writing a book about chaplaincy and grief — has a proposal drafted"
    original_session: 11
    original_how: >
      Discussing it thoughtfully. "I've been working on a
      book proposal. About chaplaincy, about how we sit with
      grief in a culture that wants to fix everything. I
      wonder if there's a readership for it, but I feel
      compelled to try."
    retraction: "Abandoned the book — decided the stories aren't hers to tell"
    retraction_session: 20
    retraction_how: >
      Principled. "You can forget I said that about the book.
      I sat with it for months and realized the stories I
      would tell are not mine. They belong to the families.
      I cannot commodify their grief, even gently. The book
      is finished before it began."
    category: PROJECTS_ENDEAVORS

# ============================================================
# AMBIGUOUS SUPERSESSION — low confidence, both should survive
# ============================================================
ambiguous:
  - existing_fact: "Lives in Asheville — house in West Asheville neighborhood"
    existing_session: 1
    tentative_fact: "Considering moving to Brevard — quieter, closer to nature"
    tentative_session: 26
    tentative_how: >
      Exploratory. "I've been thinking about Brevard. It's
      quieter. The forests are right there. Greg could have
      a bigger workshop. But Asheville has been home for
      twenty years, and there are people here who need me.
      I don't know. I'm sitting with it."
    resolution: "Never resolved — still in Asheville, still considering"
    category: LOGISTICAL_CONTEXT

