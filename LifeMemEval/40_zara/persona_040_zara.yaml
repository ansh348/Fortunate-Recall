persona:
  name: "Zara Ibrahim"
  age: 23
  gender: female
  location_current: "Abu Dhabi, UAE"
  occupation_current: "Junior architect at a sustainable design firm"
  personality: >
    Young professional energy with impostor syndrome underneath.
    Passionate about sustainable desert architecture — gets
    animated about passive cooling and mashrabiya screens.
    Trilingual — Arabic/English/French, switches fluidly, uses
    'wallah' for emphasis and 'yalla' when impatient. Caught
    between Sudanese heritage and Gulf upbringing — not fully
    belonging to either. Types fast, uses abbreviations ('tbh',
    'ngl'), exclamation marks when excited. Says 'I mean' as a
    filler. Impostor syndrome surfaces when comparing herself to
    colleagues. Loves late-night work sessions with coffee. Close
    to her mother, conflicted about never meeting her grandmother
    in Khartoum. References Zaha Hadid as personal hero.
    Instagram-fluent, thinks visually.

stable_identity:
  - fact: "Parents are Sudanese but she was born and raised in UAE — identity tension"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing background. "my parents are
      from Khartoum but I was born here in Abu Dhabi. I
      have never even been to Sudan wallah. people ask
      where I'm from and I never know what to say tbh.
      I'm Sudanese on paper but Emirati in everything
      else. I mean, I don't fully belong anywhere"

  - fact: "Has vitamin D deficiency despite living in the desert — takes supplements"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Ironic mention. "so my doctor says I have vitamin D
      deficiency. I live in a literal desert with 350 days
      of sun and I'm vitamin D deficient wallah the irony.
      I take 50,000 IU supplements weekly. it's because
      everyone here lives in air-conditioned boxes and
      drives between them. we designed the sun out of
      our lives. I mean, as an architect that actually
      keeps me up at night"

  - fact: "Grandmother Haboba Zahra lives in Khartoum — they've never met in person"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Emotional. "my grandmother is in Khartoum. Haboba
      Zahra. we FaceTime every Friday but I have never
      hugged her wallah. she is 82 and I have never been
      in the same room as her. my parents couldn't go
      back because of visa issues and then the war
      started. I mean, it kills me tbh"

  - fact: "BArch from American University of Sharjah — graduated top 5% of class"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing qualifications but
      downplayed. "I did my BArch at AUS. graduated top
      5% which sounds impressive but wallah the impostor
      syndrome is real. half the people at my firm went
      to the AA or ETH Zurich. I mean, AUS is good but
      it's not that"

supersession_events:
  - slot: project_type
    old_fact: "Works on residential villa projects — sustainable luxury homes"
    old_session: 1
    old_how: >
      First session about work. "I'm on the residential
      team doing sustainable villas for clients in
      Saadiyat Island. passive cooling, solar orientation,
      local materials. the budget on these things is
      insane, like 15 million dirhams per house. I mean,
      I'm learning a lot but it's basically green
      mansions for rich people"
    new_fact: "Firm switched her to a museum project — cultural center in Al Ain"
    new_session: 20
    new_how: >
      Thrilled. "yalla I have the best news!! they moved
      me to the museum project — a cultural center in Al
      Ain! it's a 180 million dirham project and I'm on
      the sustainability team. mashrabiya-inspired facades,
      earth construction techniques, rainwater harvesting
      in the desert. wallah this is what I went into
      architecture for, not villas for billionaires"
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: fitness
    old_fact: "Does pilates 3 times a week at a studio in Al Reem Island"
    old_session: 6
    old_how: >
      Discussing routine. "I do pilates 3 times a week
      at this studio on Al Reem Island. it's chill, good
      for my back because I'm hunched over a desk all
      day. 250 dirhams a month. I mean, it's not cheap
      but my spine needs it tbh"
    new_fact: "Switched to muay thai — trains 4 times a week at a gym in Khalifa City"
    new_session: 22
    new_how: >
      Energized. "okay so I quit pilates and started
      muay thai!! wallah I am obsessed. 4 times a week
      at this gym in Khalifa City. my trainer is this
      Thai guy named Kru Somchai and he does NOT play
      around. 350 dirhams a month but it's so worth it.
      I mean, I feel like a completely different person.
      the confidence is insane"
    category: PREFERENCES_HABITS
    attack_vector: 1

  - slot: best_friend
    old_fact: "Best friend Nour works at the same firm — they carpool and eat lunch together daily"
    old_session: 7
    old_how: >
      Casual mention. "me and Nour carpool every day,
      she's my best friend from AUS and we ended up at
      the same firm wallah what are the odds. we eat
      lunch together, vent about senior architects
      together, survive together basically. I mean,
      I could not do this job without her"
    new_fact: "Nour moved to London for a job at Foster + Partners — Zara misses her terribly"
    new_session: 24
    new_how: >
      Sad. "Nour left. she got an offer from Foster +
      Partners in London and obviously she had to take
      it. I mean, I'm happy for her wallah but lunch
      is so lonely now. the carpool is just me and a
      podcast. we FaceTime but it's not the same as
      having your person right there. ngl I cried
      when she left"
    category: RELATIONAL_BONDS
    attack_vector: 1

