    category: OBLIGATIONS_COMMITMENTS

contradictions:
  - old_fact: "Says she's grateful to work in Abu Dhabi — the opportunities are incredible"
    old_session: 5
    old_how: >
      Optimistic. "wallah I'm so grateful to be working
      here. Abu Dhabi is investing billions in culture
      and sustainability. the Louvre, the Guggenheim
      coming, the museums. I mean, for a young architect
      this is the place to be. I wouldn't want to be
      anywhere else tbh"
    new_fact: "Confesses she feels trapped in Abu Dhabi — wants international experience but can't leave due to family obligations"
    new_session: 26
    new_how: >
      Late night message, vulnerable. "sometimes I feel
      stuck here ngl. Nour is in London, my AUS friends
      are in Copenhagen, New York, everywhere. I mean,
      I love Abu Dhabi but I've never lived anywhere
      else. my parents need me here, I'm the only one
      close by. I feel like I'm watching everyone's
      career explode from my screen. wallah I want to
      experience something different"
    category: IDENTITY_SELF_CONCEPT

retractions:
  - original_fact: "Planning to apply for a master's at the AA in London next year"
    original_session: 10
    original_how: >
      Excited but nervous. "I'm going to apply to the
      AA in London for my master's. sustainable
      environmental design program. wallah it would
      change everything. the portfolio deadline is in
      6 months and I need 3 recommendation letters"
    retraction: "AA application scrapped — can't leave her parents and the museum project is too important"
    retraction_session: 21
    retraction_how: >
      Definitive. "the AA thing is dead wallah. forget
      about it. I can't leave my parents right now, not
      with Haboba's health and the situation in Sudan.
      and honestly the museum project is the opportunity
      of a lifetime. I mean, why would I leave to study
      what I'm already doing? it's off the table"
    category: PROJECTS_ENDEAVORS

ambiguous:
  - existing_fact: "Lives in Abu Dhabi — near parents, near work"
    existing_session: 1
    tentative_fact: "Thinking about moving to Dubai for a bigger design scene and more independence"
    tentative_session: 27
    tentative_how: >
      Exploring. "I've been looking at studios in Dubai
      tbh. the design scene there is more experimental.
      and I mean, living away from my parents would force
      me to grow up? but Abu Dhabi is cheaper and I'm
      20 minutes from mama's cooking wallah. I don't
      know. just thinking out loud"
    resolution: "Undecided — still in Abu Dhabi"
    category: LOGISTICAL_CONTEXT

