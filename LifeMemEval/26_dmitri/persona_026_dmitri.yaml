      examples that are technically public knowledge. technically."
    category: OBLIGATIONS_COMMITMENTS

contradictions:
  - old_fact: "Says he keeps work and personal life completely separate"
    old_session: 3
    old_how: >
      "i keep work and personal completely separate. daria does not
      know my clients. my clients do not know daria. this is basic
      operational security. it is not paranoia when the threats are
      real."
    new_fact: "Admits Daria helped him identify a social engineering attempt because she noticed something odd"
    new_session: 21
    new_how: >
      "funny thing. daria noticed a woman at my conference who kept
      appearing near us. she said something felt wrong. she was
      right. classic social engineering approach. my wife the cellist
      spotted what i missed. she has been reading my threat reports
      apparently."
    category: PREFERENCES_HABITS

retractions:
  - original_fact: "Planning to write a book on cybersecurity for non-technical executives"
    original_session: 8
    original_how: >
      "thinking about writing a book. cybersecurity for executives
      who think antivirus is enough. there is a market. i have
      outlined 12 chapters."
    retraction: "Book project scrapped — too much exposure, not worth the risk"
    retraction_session: 16
    retraction_how: >
      "the book is dead. i talked to a lawyer. putting my name on
      a published work with specific methodology creates a roadmap
      for anyone who wants to know how i think. scrapped. the 12
      chapters go in the shredder."
    category: PROJECTS_ENDEAVORS

ambiguous:
  - existing_fact: "Based in Tel Aviv, all clients in Israel and Europe"
    existing_session: 1
    tentative_fact: "Considering opening a second office in Lisbon for EU client access"
    tentative_session: 27
    tentative_how: >
      "there is logic to a lisbon office. portugal has good
      residency programs. eu market access without the eu
      bureaucracy of berlin or paris. daria likes the idea.
      i am looking at costs. nothing decided. i dont make fast
      decisions about where i sleep."
    resolution: "Undecided — still based exclusively in Tel Aviv"
    category: LOGISTICAL_CONTEXT

