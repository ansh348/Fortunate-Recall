# LIFEMEMBENCH — PERSONA 026: Dmitri Volkov
# ============================================================

persona:
  name: "Dmitri Volkov"
  age: 44
  gender: male
  location_current: "Tel Aviv, Israel"
  occupation_current: "Independent cybersecurity consultant"
  personality: >
    Paranoid by profession, not by nature — though the line has blurred.
    Dark humor delivered deadpan. Russian bluntness layered with Israeli
    directness makes for short, declarative sentences. Never uses his
    real name online. Trusts systems, not people. Sentimental about
    exactly two things: his mother's cooking and his wife Daria's cello
    playing. Types in lowercase, minimal punctuation. Uses periods like
    walls. Thinks in threat models. Will tell you your password is bad
    before saying hello. Occasionally drops Russian words — 'da',
    'nichego', 'blyad' when frustrated. Military background shows in
    structure and brevity.

stable_identity:
  - fact: "Immigrated to Israel from Moscow at age 15 with his mother"
    session: 3
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      comes up when discussing background. "moved to israel from
      moscow when i was 15. my mother and me. father stayed. that
      was the last correct decision he made. i learned hebrew in
      the army. fastest language course available."

  - fact: "Wife Daria is a cellist — plays with the Israel Philharmonic"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      mentioned when discussing evening plans. "daria has rehearsal
      tonight. brahms. she plays cello with the philharmonic. when
      she practices at home i close the office door but i leave it
      open a crack. dont tell her."

  - fact: "Has tinnitus from military service — constant ringing in left ear"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      mentioned during discussion about working conditions. "the
      tinnitus is worse today. left ear. souvenir from the army.
      constant ringing at about 4 khz. i measured it. some people
      have white noise machines. i have one built in."

  - fact: "MSc from Technion in computer science, served in IDF Unit 8200"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      comes up in professional context. "technion for the degree.
      8200 for the education. different things. the degree teaches
      you how systems work. the unit teaches you how they break.
      both useful. the second one pays better."

supersession_events:
  - slot: major_client
    old_fact: "Largest client is FinSecure — Israeli banking security firm, $15,000/month retainer"
    old_session: 1
    old_how: >
      first session. "finsecure is the main contract. 15k a month
      retainer. banking sector security audit and penetration
      testing. boring but stable. they pay on time which in this
      business is not nothing."
    new_fact: "Dropped FinSecure — discovered they were selling vulnerability data to third parties"
    new_session: 20
    new_how: >
      blunt. "i dropped finsecure. found out they were selling
      vuln reports to a third party. i wont say who. i told them
      this is over. 15k a month is not worth my professional
      integrity. or prison. mostly prison."
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: comms_app
    old_fact: "Uses Signal for all client communications"
    old_session: 6
    old_how: >
      discussing security tools. "signal for everything. clients
      who refuse to use signal dont become clients. its the minimum
      acceptable standard. not perfect but the protocol is solid."
    new_fact: "Switched from Signal to Briar for sensitive client communications"
    new_session: 22
    new_how: >
      "moved to briar for the sensitive stuff. signal is fine for
      most things but briar runs over tor. no phone number required.
      no central server. for certain clients this matters. for
      certain governments this matters more."
    category: PREFERENCES_HABITS
    attack_vector: 1

  - slot: apartment
    old_fact: "Lives in a 3rd-floor apartment in Florentin neighborhood"
    old_session: 7
    old_how: >
      discussing home office. "florentin. 3rd floor. the apartment
      is fine. the neighborhood is loud but i have the tinnitus
      anyway so. home office in the second bedroom. daria has the
      living room for practice."
    new_fact: "Moved to a 7th-floor apartment in Sarona — better physical security"
    new_session: 24
    new_how: >
      "moved to sarona. 7th floor. controlled access. camera in
      the lobby. elevator requires a fob. the florentin place had
      a shared entrance anyone could walk into. this costs more
      but i sleep better. relatively speaking."
    category: LOGISTICAL_CONTEXT
    attack_vector: 1

