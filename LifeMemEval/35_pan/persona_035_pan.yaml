persona:
  name: "Pornpan 'Pan' Srisai"
  age: 29
  gender: female
  location_current: "Bangkok, Thailand"
  occupation_current: "Street food vendor (khao man gai) and Instagram food content creator"
  personality: >
    Bubbly and entrepreneurial — food is her love language and her
    cart is her baby. Tinglish speaker (Thai-English mix) with emoji
    use that feels natural, not forced. A hustler with genuine warmth.
    Early morning market runs are sacred. Talks about her cart the
    way other people talk about their children. Types with enthusiasm
    — lots of exclamation marks and 'haha'. Says 'na ka' for
    politeness, 'arai wa' when surprised, 'sabai sabai' when things
    are chill. Numbers matter to her — baht per kilo, portions per
    day, followers gained. Wakes up at 4am for the market and thinks
    that's normal.

stable_identity:
  - fact: "Mother taught her the khao man gai recipe — passed down through 3 generations from grandmother"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Talking about her food. "my mom teach me the recipe na ka.
      her mom teach her too. 3 generations!! the secret is the
      chicken fat rice and the sauce. I cannot tell you the sauce
      haha but my grandma would be proud I think"

  - fact: "Has acid reflux — ironic for a street food vendor"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentions when talking about late-night eating. "I have acid
      reflux haha so ironic right!! I cook food all day but my
      stomach say no to spicy. doctor give me omeprazole. 20mg
      every morning before I go to market. still eat spicy
      sometimes because I am Thai na ka what can I do"

  - fact: "Younger brother Nong Beam is in the army — mandatory conscription, 2 years"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Worried about him. "my brother Beam is in army na ka.
      conscription. he got the red card in lottery. 2 years!!
      he was supposed to help me at cart but now he's in
      Nakhon Ratchasima. I send him money every month, 3,000
      baht. he hate it there"

  - fact: "Graduated from vocational culinary program at Dusit Thani College"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Talking about cooking credentials. "I went to Dusit Thani
      College for culinary na ka. vocational program. my friends
      all go work in hotel kitchen but I think street food is
      more honest. more free. my teacher say I was crazy haha
      but look at me now 350 plates a day!!"

supersession_events:
  - slot: rice_supplier
    old_fact: "Buys jasmine rice from Auntie Somjit at Khlong Toei market — 38 baht per kilo"
    old_session: 1
    old_how: >
      First session, talking about her supply chain. "I buy rice
      from Auntie Somjit at Khlong Toei. 38 baht per kilo. good
      quality, she know what I need. I go every morning 4:30am.
      she always have my 15 kilos ready"
    new_fact: "Switched rice supplier to Uncle Prasert at Talat Thai wholesale — 32 baht per kilo, better quality"
    new_session: 19
    new_how: >
      Explaining the change. "I switch rice supplier na ka. Auntie
      Somjit rice quality go down, too many broken grains. now I
      buy from Uncle Prasert at Talat Thai. 32 baht per kilo and
      the grain is longer. my customers notice the difference!!
      I buy 20 kilos now because more customers"
    category: PREFERENCES_HABITS
    attack_vector: 1

  - slot: stove
    old_fact: "Cooks on charcoal stove — traditional method, better flavour"
    old_session: 6
    old_how: >
      Passionate about method. "I use charcoal na ka. always
      charcoal. the smoke give the chicken skin that flavour
      you cannot get from gas. my mom say charcoal is the only
      way and she is right"
    new_fact: "Switched to gas stove for speed, then back to charcoal — customers complained about taste difference"
    new_session: 16
    new_how: >
      Back to charcoal. "okay so I try gas stove for 2 months
      because faster right? but my regular customers say the
      taste is different. one aunty tell me 'Pan this is not
      your chicken anymore.' arai wa!! I go back to charcoal
      same day. never again gas. some things you cannot rush na ka"
    category: PREFERENCES_HABITS
    attack_vector: 4

  - slot: cart_location
    old_fact: "Cart is on Soi Rangnam near Victory Monument BTS — same spot 4 years"
    old_session: 7
    old_how: >
      Talking about location. "my cart is on Soi Rangnam near
      Victory Monument. 4 years same spot. the office workers
      know me. lunch rush is 11 to 1:30, I sell 200 plates
      minimum. the spot is everything in street food"
    new_fact: "Moved cart to Soi Sukhumvit 38 near Thonglor BTS — new condo development brought more customers"
    new_session: 24
    new_how: >
      Excited. "I move my cart!! Soi Sukhumvit 38 near Thonglor
      BTS. new condos there so many office people and the rent for
      spot is only 1,500 baht more per month. I sell 350 plates
      now instead of 200!! best decision. I cry leaving Soi Rangnam
      but business is business na ka"
    category: LOGISTICAL_CONTEXT
    attack_vector: 1

expiring_logistics:
  - fact: "Instagram collaboration with Grab Food — photo shoot March 8, 2025"
    session: 10
    event_date: "2025-03-08"
    status: expired
    how_disclosed: >
      Excited. "Grab Food want to do collaboration with me!! photo
      shoot March 8 na ka. they feature me on their app. 45,000
      baht for the deal!! I need to make the cart look nice. maybe
      new sign haha"
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Brother Beam's conscription ends — August 20, 2025"
    session: 12
    event_date: "2025-08-20"
    status: expired
    how_disclosed: >
      Counting down. "Beam finish army August 20!! I mark on my
      calendar. he can come help me at cart finally. 2 years is
      too long. he is skinny now from army food haha I need to
      feed him proper"
    category: LOGISTICAL_CONTEXT

  - fact: "Street food vendor license renewal deadline — July 15, 2026"
    session: 29
    event_date: "2026-07-15"
    status: upcoming
    how_disclosed: >
      Annoyed about bureaucracy. "license renewal July 15. every
      year same thing. 2,800 baht and you wait in line at city
      hall all day. I need to bring ID, health cert, cart photos.
      if you miss it they can shut you down. Bangkok bureaucracy
      na ka very fun haha"
    category: OBLIGATIONS_COMMITMENTS

contradictions:
  - old_fact: "Says she would never open a restaurant — street food is freedom"
    old_session: 5
    old_how: >
      Certain. "I never open restaurant na ka. restaurant is jail!!
      rent, staff, AC bill. on the street I am free. I am my own
      boss. if I want day off I take day off. restaurant people
      work until they die"
    new_fact: "Has been looking at a small shop space on Sukhumvit for a sit-down khao man gai restaurant"
    new_session: 27
    new_how: >
      Dreamy. "so I find this small shop on Sukhumvit na ka. 12
      seats. the rent is 35,000 baht per month which is a lot but
      I could do dinner service too. air con for customers during
      hot season. I keep the cart AND have the shop. I been thinking
      about this a lot"
    category: PROJECTS_ENDEAVORS

retractions:
  - original_fact: "Planning to launch a bottled sauce line — already testing recipes with 4 flavours"
    original_session: 11
    original_how: >
      Excited. "I want to make bottled sauce na ka!! my special
      sauce. 4 flavours — original, extra spicy, ginger, and
      garlic. I already test recipes. if I sell 500 bottles per
      month at 89 baht each that is good money right??"
    retraction: "Sauce line scrapped — food safety certification too expensive and complicated"
    retraction_session: 21
    retraction_how: >
      Frustrated. "the bottled sauce is dead na ka. the food safety
      certification cost 180,000 baht!! and I need a factory kitchen
      not my cart. too complicated too expensive. forget about it.
      I just focus on the cart and Instagram. that is enough for now"
    category: PROJECTS_ENDEAVORS

ambiguous:
  - existing_fact: "Runs her Instagram food account with 47,000 followers"
    existing_session: 8
    tentative_fact: "Thinking about starting a YouTube cooking channel — friend offered to film"
    tentative_session: 26
    tentative_how: >
      Considering. "my friend Fern say she can film for me and I
      start YouTube channel na ka. cooking tutorial style. but
      YouTube is so much work and I already wake up 4am. I don't
      know if I have energy. maybe just try one video and see?
      but maybe not. I think about it"
    resolution: "Undecided — hasn't started"
    category: PROJECTS_ENDEAVORS

