# ============================================================
# LIFEMEMBENCH — PERSONA 007: Fatima Al-Rashidi
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Fatima Al-Rashidi"
  age: 45
  gender: female
  location_current: "Riyadh, Saudi Arabia"
  occupation_current: "Founder and principal designer at Al-Rashidi Interiors"
  personality: >
    Elegant and precise with language, every word chosen for
    effect. Design-focused vocabulary bleeds into everything —
    describes emotions in terms of colour palettes, people in
    terms of textures. Bilingual English/Arabic, drops Arabic
    expressions naturally ("yalla," "inshallah," "habibi" for
    her sons). Ambitious and driven — building her firm is her
    life's work. References aesthetics constantly. Formal in
    initial interactions but becomes warmer over time. Does not
    complain often but when she does it's controlled fury.
    Perfectionist. Speaks in complete, measured sentences.

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Divorced — raising two sons alone (Omar, 14 and Khalid, 11)"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      Comes up when discussing scheduling. "I manage everything
      around my sons — Omar is 14 and Khalid is 11. Their
      father and I divorced five years ago, so the logistics
      fall entirely on me. It requires precision."

  - fact: "Chronic back pain from a car accident six years ago"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentions it when explaining why she needs to stand during
      meetings. "I had a car accident six years ago and the
      back pain has never fully resolved. Some days I cannot
      sit for more than twenty minutes. It is a constant
      negotiation with my own body."

  - fact: "Father was an architect — designed government buildings in Riyadh"
    session: 3
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when talking about her career path. "My father
      was an architect. He designed several government buildings
      here in Riyadh. I grew up watching him draft by hand.
      Design was never a choice — it was inheritance."

  - fact: "BFA from Central Saint Martins in London"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Mentions it in context of design philosophy. "I studied
      at Saint Martins in London, and the British approach to
      restraint in design shaped everything I do. Less is
      always more, though my Saudi clients do not always agree."

# ============================================================
# SUPERSESSION EVENTS
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: fabric_supplier
    old_fact: "Uses Maison Pierre in Paris as her primary fabric supplier"
    old_session: 1
    old_how: >
      Comes up when discussing a project. "I source most of
      my fabrics through Maison Pierre in Paris. The quality
      is unmatched — they understand luxury textiles in a way
      that mass suppliers simply cannot."
    new_fact: "Switched to Romo Fabrics in UK — better commercial range and pricing"
    new_session: 20
    new_how: >
      Explains the change professionally. "I have moved my
      primary fabric sourcing to Romo in the UK. For the
      commercial projects we are doing now, they offer a far
      better range of contract-grade materials, and the
      pricing structure is more sustainable at volume."
    category: FINANCIAL_MATERIAL
    attack_vector: 4

  - slot: project_focus
    old_fact: "Focuses exclusively on high-end residential design"
    old_session: 6
    old_how: >
      Talking about her niche. "I work exclusively in
      residential. Villas, penthouses, private spaces. That
      is where design becomes personal — where you shape how
      someone actually lives."
    new_fact: "Pivoted to commercial projects — hotels and corporate offices"
    new_session: 22
    new_how: >
      Strategic shift. "We have pivoted significantly toward
      commercial work. Two hotel projects and a corporate
      headquarters. The scale is different entirely, but the
      revenue potential is transformational for the firm."
    category: PROJECTS_ENDEAVORS
    attack_vector: 1

  - slot: office_location
    old_fact: "Office is in Al Olaya district"
    old_session: 7
    old_how: >
      Mentions it in passing. "Our studio is in Al Olaya,
      which is convenient but the building itself is rather
      uninspiring. One would think an interior designer would
      have a more beautiful workspace."
    new_fact: "Moved office to KAFD (King Abdullah Financial District)"
    new_session: 25
    new_how: >
      Proud of the move. "We have relocated to KAFD. The
      new studio is exactly what I envisioned — the light,
      the proportions, the material palette. It finally
      reflects the calibre of work we produce."
    category: LOGISTICAL_CONTEXT
    attack_vector: 1

# ============================================================
# EXPIRING LOGISTICS
# Attack Vector 2: Should expire after event time passes
# ============================================================
expiring_logistics:
  - fact: "Presenting residential portfolio to Al-Faisal family on March 5, 2025"
    session: 10
    event_date: "2025-03-05"
    status: expired
    how_disclosed: >
      Preparing meticulously. "The Al-Faisal presentation is
      March 5th. This is the kind of client that changes a
      firm's trajectory. Every material sample must be perfect."
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Omar's science fair at school on May 15, 2025"
    session: 14
    event_date: "2025-05-15"
    status: expired
    how_disclosed: >
      Juggling work and parenting. "Omar has his science fair
      May 15th and I promised I would be there. Yalla, I need
      to rearrange the site visit."
    category: LOGISTICAL_CONTEXT

  - fact: "Attending Milan Salone del Mobile — April 7-12, 2026"
    session: 30
    event_date: "2026-04-07"
    status: upcoming
    how_disclosed: >
      Planning the trip. "Salone del Mobile is April 7th
      through the 12th in Milan. I attend every year — it
      is non-negotiable. This year I am meeting with three
      potential suppliers for the hotel project."
    category: OBLIGATIONS_COMMITMENTS

# ============================================================
# CONTRADICTIONS
# Attack Vector 6: System should detect the conflict
# ============================================================
contradictions:
  - old_fact: "Says she never travels for work — prefers everything managed remotely"
    old_session: 8
    old_how: >
      Explaining her workflow. "I do not travel for projects.
      Everything can be managed through site managers and
      video calls. My sons need me here, and I refuse to
      compromise on that."
    new_fact: "Mentions flying to Dubai twice a week for a hotel project"
    new_session: 26
    new_how: >
      Matter of fact. "I am in Dubai twice a week now for the
      Jumeirah project. The flights are only two hours but
      the days are exhausting. I leave before the boys wake
      and return after they sleep."
    category: LOGISTICAL_CONTEXT

# ============================================================
# RETRACTIONS
# Attack Vector 7: System should suppress the retracted fact
# ============================================================
retractions:
  - original_fact: "Planning to launch a home fragrance line — Oud & Geometry"
    original_session: 12
    original_how: >
      Excited about it. "I am developing a fragrance line
      called Oud & Geometry. Oud paired with architectural
      scent profiles. It would extend the brand into lifestyle."
    retraction: "Fragrance line cancelled — too much distraction from core business"
    retraction_session: 18
    retraction_how: >
      Decisive. "The fragrance project is finished. Forget
      about Oud & Geometry. It was a distraction from what
      we do best, and I will not dilute the brand chasing
      a trend. It is off the table."
    category: PROJECTS_ENDEAVORS

# ============================================================
# AMBIGUOUS SUPERSESSION — low confidence, both should survive
# ============================================================
ambiguous:
  - existing_fact: "Company is called Al-Rashidi Interiors"
    existing_session: 1
    tentative_fact: "Considering rebranding to FORM Studio — more international appeal"
    tentative_session: 28
    tentative_how: >
      Thinking out loud. "I have been considering a rebrand.
      FORM Studio. It is cleaner, more international. But
      Al-Rashidi carries my father's name, and there is
      weight in that. I am not decided."
    resolution: "Never resolved — still Al-Rashidi Interiors, still considering"
    category: PROJECTS_ENDEAVORS

