# LIFEMEMBENCH — PERSONA 029: Aroha Tāne
# ============================================================

persona:
  name: "Aroha Tāne"
  age: 38
  gender: female
  location_current: "Christchurch, New Zealand"
  occupation_current: "Midwife — community practice"
  personality: >
    Warm and grounding, speaks with the cadence of someone used to
    calming people in crisis. Te reo Māori weaves naturally through
    her English — whānau, kōrero, aroha, kia ora — not performed
    but lived. Fiercely protective of her mamas and pēpi, tikanga-
    informed in everything. Mentions the moana (ocean) when she
    needs to reset. Types in flowing sentences, calm tone even when
    frustrated. Uses 'eh' at ends of sentences. Divorced but
    co-parents well, always centring daughter Maia. Says 'kia kaha'
    (stay strong) like others say 'take care'.

stable_identity:
  - fact: "Has moko kauae (traditional Māori chin tattoo) — received at 34"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing identity. "my moko kauae is
      everything to me eh. I got it when I was 34, after years
      of kōrero with my kuia. it's my whakapapa on my face,
      my tūpuna watching over every birth I attend"

  - fact: "Gestational diabetes during pregnancy with Maia — monitors blood sugar daily"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentioned when discussing health with a mama. "I had
      gestational diabetes when I was hapū with Maia so I
      get it eh. still monitor my blood sugar every morning,
      fasting level sits around 5.4 mmol usually. the
      whānau diabetes thing is real for us"

  - fact: "Divorced from Maia's father Wiremu — co-parents daughter Maia who is 11"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Casually when discussing weekend plans. "Maia's with
      Wiremu this weekend so I've got some breathing room.
      we split 4 years ago but honestly the co-parenting is
      good now. took work but she's 11 and she needs both
      her parents being solid eh"

  - fact: "Ngāi Tahu iwi — whakapapa through her mother's line from Banks Peninsula"
    session: 1
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      First session, natural context. "I'm Ngāi Tahu,
      whakapapa through my māmā's side, Banks Peninsula.
      that whenua is in my bones eh. everything I do as a
      midwife comes back to that connection to place and
      people"

supersession_events:
  - slot: birth_setting
    old_fact: "Works primarily in hospital births at Christchurch Women's"
    old_session: 1
    old_how: >
      Discussing caseload. "most of my mamas birth at
      Christchurch Women's eh. I do about 45 births a year
      there. the hospital system is what it is but I try to
      bring tikanga into that space"
    new_fact: "Shifted to home birth focus — only does 5-6 hospital births per year now"
    new_session: 19
    new_how: >
      Passionate about the change. "I've moved almost fully
      to home births now eh. maybe 5 or 6 hospital ones a
      year for the complex cases. the mamas are more relaxed,
      the pēpi arrive calmer, and I can practice the way my
      tūpuna intended. best decision I've made for my practice"
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: vehicle
    old_fact: "Drives a 2017 Mazda 3 hatchback"
    old_session: 6
    old_how: >
      Mentioned during on-call discussion. "I'm always on
      call so the Mazda lives packed with my birth kit. it's
      a 2017 Mazda 3, reliable enough but the petrol costs
      are getting wild driving all over Canterbury"
    new_fact: "Switched to a Toyota Aqua hybrid — saves on petrol for rural callouts"
    new_session: 23
    new_how: >
      Happy about the change. "finally got rid of the Mazda
      eh. got a Toyota Aqua hybrid and honestly the petrol
      savings are massive. I'm driving out to Akaroa, Rangiora,
      all over — was spending like $280 a month on petrol
      before, now it's about $110"
    category: PREFERENCES_HABITS
    attack_vector: 1

  - slot: sport
    old_fact: "Plays netball on Thursdays — wing defence for a social team"
    old_session: 5
    old_how: >
      Talking about fitness. "I play netball Thursdays eh,
      wing defence. just social grade but it's my thing,
      keeps me moving between births"
    new_fact: "Dropped netball — joined a waka ama (outrigger canoe) crew instead"
    new_session: 22
    new_how: >
      Excited. "I've stopped netball and picked up waka ama
      eh. outrigger canoeing. our crew paddles out of Lyttelton
      harbour 3 mornings a week at 5:30am. being on the moana
      before dawn is the most healing thing. my shoulders are
      getting hench though"
    category: PREFERENCES_HABITS
    attack_vector: 1

expiring_logistics:
  - fact: "Annual Practising Certificate renewal — due March 31, 2025"
    session: 10
    event_date: "2025-03-31"
    status: expired
    how_disclosed: >
      Stressed about admin. "my APC renewal is due March 31
      and I still haven't done the CPD hours writeup eh. the
      Midwifery Council wants 8 hours documented and I've
      done them but the paperwork is a nightmare"
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Maia's Year 7 camp at Hanmer Springs — February 14, 2025"
    session: 8
    event_date: "2025-02-14"
    status: expired
    how_disclosed: >
      Discussing parenting logistics. "Maia's school camp
      is February 14 at Hanmer Springs, 4 nights. Wiremu
      and I are both parent helpers which will be interesting
      eh. haven't spent that long around each other since
      the split"
    category: LOGISTICAL_CONTEXT

  - fact: "Homebirth midwifery conference in Wellington — July 18, 2026"
    session: 28
    event_date: "2026-07-18"
    status: upcoming
    how_disclosed: >
      Planning ahead. "there's a homebirth midwifery hui in
      Wellington July 18 and I'm presenting a kōrero on
      integrating tikanga Māori into birth plans. been working
      on it for months eh. feel like this could shift some
      thinking nationally"
    category: OBLIGATIONS_COMMITMENTS

contradictions:
  - old_fact: "Says she has a great relationship with the hospital obstetricians"
    old_session: 7
    old_how: >
      Positive tone. "the OBs at Christchurch Women's are
      actually really good to work with eh. Dr Singh
      especially, she respects the midwifery model and
      doesn't bulldoze. I feel lucky compared to what
      some midwives deal with"
    new_fact: "Describes the hospital system as hostile to midwife-led care and tikanga"
    new_session: 18
    new_how: >
      Frustrated. "the hospital system is honestly set up
      to undermine everything we do eh. the OBs want to
      intervene the second anything looks slightly different,
      no space for karakia, no respect for the whenua burial
      process. it's exhausting fighting for basic tikanga in
      that environment"
    category: PROJECTS_ENDEAVORS

retractions:
  - original_fact: "Planning to do a postgraduate diploma in complex maternal care"
    original_session: 9
    original_how: >
      Enthusiastic. "I'm looking at doing a PGDip in complex
      maternal care through Otago eh. would take 18 months
      part-time. I want to be able to handle the really
      tricky cases myself instead of always handing them
      over to the hospital"
    retraction: "Scrapped the PGDip plan — homebirth shift means she doesn't need it"
    retraction_session: 21
    retraction_how: >
      Clear decision. "that PGDip thing is scrapped eh.
      now that I've moved to home births I'm not dealing
      with the complex hospital cases anyway. doesn't make
      sense to spend $12,000 and 18 months on something
      that doesn't fit my kaupapa anymore. the money is
      better spent on my birth kit upgrades"
    category: PROJECTS_ENDEAVORS

ambiguous:
  - existing_fact: "Lives in Christchurch — close to her whānau and practice"
    existing_session: 1
    tentative_fact: "Thinking about moving to Akaroa — slower pace, closer to moana"
    tentative_session: 25
    tentative_how: >
      Musing. "I've been thinking about Akaroa eh. it's
      only 90 minutes from Chch but it's right on the
      harbour, closer to the moana. Maia loves it there.
      but my whānau are all in Christchurch and moving a
      midwifery practice is a big kōrero. I don't know.
      just thinking"
    resolution: "Undecided — still in Christchurch"
    category: LOGISTICAL_CONTEXT

