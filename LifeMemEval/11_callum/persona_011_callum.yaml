# ============================================================
# LIFEMEMBENCH — PERSONA 011: Callum Fraser
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Callum Fraser"
  age: 29
  gender: male
  location_current: "Inverness, Scotland"
  occupation_current: "Farm veterinarian — large animal practice, mostly cattle and sheep"
  personality: >
    Deadpan Scottish humor, says 'aye' and 'wee' constantly.
    Pragmatic to the bone — if it doesn't need saying, he won't
    say it. Weather-obsessed in the way only someone who works
    outdoors in the Highlands can be. Types with shortcuts and
    abbreviations — 'prob', 'tbh', 'ngl'. Dry as a bone. Talks
    about sheep and cattle like they're colleagues he barely
    tolerates. Doesn't complain about his Crohn's disease but
    will mention it matter-of-factly when it affects his plans.
    Loyal, reliable, not one for big emotional displays. Loves
    his sister Fiona but shows it by winding her up. Ends
    messages with full stops, rarely exclamation marks.

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Grew up on a sheep farm near Aviemore"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when talking about why he became a vet. "aye
      grew up on a sheep farm near aviemore. been around
      livestock my whole life. becoming a vet was just the
      logical next step tbh. that or farming and I saw what
      farming does to you."

  - fact: "Has Crohn's disease — diagnosed at 21"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentions it when explaining a cancellation. "got to
      move the afternoon. crohns flare. been dealing with
      it since i was 21 and some days are just a write-off.
      nothing dramatic just need to be near a toilet. sorry
      if thats too much info."

  - fact: "Sister Fiona is a midwife in Glasgow"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions her casually. "my sister fiona is a midwife
      in glasgow. she thinks she has the harder job and
      honestly she prob does but ill never admit that to
      her face."

  - fact: "BVetMed from the Royal (Dick) School at Edinburgh"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when talking about a tricky case. "did my
      vet degree at edinburgh. the dick school. five years
      of that and most of what I actually use i learned in
      the first year on farm placements."

# ============================================================
# SUPERSESSION EVENTS
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: practice
    old_fact: "Works for the NHS Highland rural veterinary service"
    old_session: 1
    old_how: >
      First session context. "work for NHS highland rural
      vet service. covers a massive area — farms from
      inverness up to caithness. lots of driving. lots of
      sheep."
    new_fact: "Left NHS — joined a private practice, Highland Vets in Inverness"
    new_session: 19
    new_how: >
      Matter of fact. "left the nhs service. moved to
      highland vets in inverness. private practice. better
      money better equipment and I don't have to drive to
      caithness in january anymore which is reason enough
      tbh."
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: vehicle
    old_fact: "Drives an old Land Rover Defender — 1998, held together by rust"
    old_session: 6
    old_how: >
      Talking about farm calls. "the defender is on its last
      legs. 1998. more rust than metal at this point. but
      it gets through anything. well. most things."
    new_fact: "Got a Toyota Hilux — the Defender finally died"
    new_session: 24
    new_how: >
      "the defender died. properly this time. got a hilux.
      feels like cheating honestly its too reliable. miss
      the character of the old thing but not the breakdowns."
    category: FINANCIAL_MATERIAL
    attack_vector: 1

  - slot: sport
    old_fact: "Plays rugby — winger for Inverness Highland RFC"
    old_session: 7
    old_how: >
      Talking about his weekend. "play rugby saturdays for
      inverness highland rfc. winger. not fast enough for
      it anymore but nobody else wants the position so
      here we are."
    new_fact: "Quit rugby — took up fell running instead"
    new_session: 25
    new_how: >
      "gave up rugby. knees and the crohns werent mixing
      well with getting tackled every saturday. doing fell
      running now. just me and the hills. suits me better
      honestly."
    category: HOBBIES_RECREATION
    attack_vector: 1

