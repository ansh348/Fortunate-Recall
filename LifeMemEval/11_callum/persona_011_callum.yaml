    new_fact: "Mentions he's been staying at his girlfriend's flat in Edinburgh most weekends"
    new_session: 28
    new_how: >
      Casual mention. "been in edinburgh most weekends.
      eilidh has a flat in stockbridge and its actually
      quite nice. good coffee. we went up arthurs seat
      sunday."
    category: LOGISTICAL_CONTEXT

