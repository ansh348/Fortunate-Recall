    original_session: 11
    original_how: >
      Exploring the idea. "been looking at an equine surgery
      cert. theres demand for horse vets up here and it would
      be good money. six month course at edinburgh."
    retraction: "Equine cert is off — too expensive and he doesn't even like horses"
    retraction_session: 17
    retraction_how: >
      Classic Callum. "the equine thing is dead. looked at
      the cost and its mental. also ngl I dont even really
      like horses. massive dramatic creatures. ill stick
      with cattle. forget I said anything."
    category: PROJECTS_ENDEAVORS

