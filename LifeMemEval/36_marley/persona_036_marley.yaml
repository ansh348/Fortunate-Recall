contradictions:
  - old_fact: "Says he doesn't want to work in elite sport — community physio is where the need is"
    old_session: 3
    old_how: >
      Passionate. "I'm not trying to be a Premier League physio
      you know. those players have access to everything already.
      I want to work in community. the kid who tears his ACL
      playing Sunday league and can't afford rehab. that's who
      needs me"
    new_fact: "Has been shadowing a physio at Bristol City FC and admits he loves the elite environment"
    new_session: 26
    new_how: >
      Conflicted but honest. "so I've been shadowing the physio
      at Bristol City. twice a week. and bruv the facilities are
      unreal. hydrotherapy pool, anti-gravity treadmill, the lot.
      icl I love it. the level of detail in their rehab programs
      is next level. I could see myself doing this you know"
    category: PROJECTS_ENDEAVORS

  - old_fact: "Says he manages his workload fine — coaching and studying balance each other"
    old_session: 8
    old_how: >
      Confident. "nah I manage it fine init. coaching twice a week
      and studying the rest. they balance each other out. coaching
      is my break from the textbooks. I've got a good routine"
    new_fact: "Admits he's been running on 4 hours sleep and his grades are slipping"
    new_session: 23
    new_how: >
      Tired. "tbh I'm barely sleeping. 4 hours most nights. the
      placement is full time, coaching is Tuesday Thursday, and I
      still have assignments. my last essay came back at 58 which
      is bare low for me. something's gotta give but I don't know
      what"
    category: HEALTH_WELLBEING

