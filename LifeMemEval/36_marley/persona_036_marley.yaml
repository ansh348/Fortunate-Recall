persona:
  name: "Marcus 'Marley' Williams"
  age: 25
  gender: male
  location_current: "Bristol, UK"
  occupation_current: "Physio student (completing BSc Physiotherapy) and youth football coach"
  personality: >
    Bristol meets Caribbean family culture. Uses UK slang naturally —
    'init', 'bare', 'proper', 'mad', 'bruv'. Passionate about making
    physiotherapy accessible to communities that can't afford it.
    Code-switches between uni mode (structured, clinical language),
    coaching mode (motivational, direct), and home mode (Caribbean
    warmth, grandmother's influence). Types fast with abbreviations —
    'tbh', 'ngl', 'icl' (I can't lie). 'You know' is his filler.
    First to hype someone up, last to talk about his own struggles.
    Gets emotional about his grandmother but covers it with humour.

stable_identity:
  - fact: "Raised by grandmother Iris after mother passed when he was 7 — grandmother is from Barbados"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      Comes up when talking about family. "my nan raised me you
      know. my mum passed when I was 7. nan Iris is from Barbados,
      came over in the 60s. she's 78 now and still cooks rice and
      peas every sunday like clockwork. that woman is everything
      to me bruv I owe her the world"

  - fact: "Tore his ACL playing football at 17 — surgery and 9-month rehab is what got him into physiotherapy"
    session: 3
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Explaining his career choice. "I tore my ACL when I was 17.
      playing for the youth team. the physio who rehabbed me was
      this guy called Marcus too which is mad. 9 months of rehab
      and I was like yeah this is what I want to do. help people
      get back to moving you know"

  - fact: "Has a repaired ACL — still gets stiffness in cold weather"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentions during a rainy day. "my knee is proper stiff today
      init. the ACL repair is solid but cold weather and rain make
      it ache. I'm 25 with an old man's knee. the irony of a
      physio student with a dodgy knee you know"

  - fact: "Studying BSc Physiotherapy at University of the West of England (UWE)"
    session: 1
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      First session. "I'm doing physio at UWE. third year now.
      placements are mad intense but I love it. I want to work
      in community physio when I graduate, not private practice.
      accessible physio you know. for people who can't pay 60
      quid a session"

