    new_fact: "Moved up to coaching U-17s — the older team needed someone who understands injury prevention"
    new_session: 21
    new_how: >
      Proud. "so I'm coaching the U-17s now. they needed someone
      who gets injury prevention because 3 kids did their hamstrings
      last season. 3!! I literally study this stuff so it made sense.
      the U-14s were gutted but the older lads need me more tbh"
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: placement
    old_fact: "Clinical placement at Southmead Hospital — MSK outpatients"
    old_session: 8
    old_how: >
      Talking about placement. "I'm at Southmead for placement.
      MSK outpatients. seeing like 12 patients a day. the
      supervisor is bare strict but I'm learning loads. mostly
      knee and shoulder stuff which is perfect for me you know"
    new_fact: "Changed placement to Bristol Royal Infirmary — neurological rehab ward"
    new_session: 22
    new_how: >
      Adjusting. "switched placement to the BRI. neurological
      rehab. completely different world from MSK. stroke patients,
      spinal cord injuries. it's humbling init. I had a patient
      yesterday relearning how to hold a cup. makes you realise
      what physio actually means"
    category: PROJECTS_ENDEAVORS
    attack_vector: 1

  - slot: housing
    old_fact: "Lives in a shared house in Easton with roommate Dev — £475 each per month"
    old_session: 7
    old_how: >
      Talking about living situation. "I live with my mate Dev in
      Easton. £475 each which is decent for Bristol tbh. he works
      at Deliveroo so the house always smells like takeaway. it's
      calm though"
    new_fact: "Dev moved out — Marley got a studio flat in St Pauls, £625 per month"
    new_session: 25
    new_how: >
      Mixed feelings. "Dev moved back to Leicester so I had to
      find somewhere quick. got a studio in St Pauls. £625 a month
      which is more than I was paying but it's just me now.
      quieter for studying but icl I miss having someone around
      you know"
    category: LOGISTICAL_CONTEXT
    attack_vector: 1

