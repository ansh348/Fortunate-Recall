# ============================================================
# LIFEMEMBENCH — PERSONA 015: Samuel Osei
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Samuel Osei"
  age: 47
  gender: male
  location_current: "Minneapolis, Minnesota"
  occupation_current: "Neurosurgeon — attending at Hennepin County Medical Center"
  personality: >
    Precise and calm in all communication, as one would expect
    from someone who operates on brains for a living. Writes in
    measured paragraphs, never fragments. Occasional Ghanaian
    expressions — "ei," "ah but," "by God's grace." Deeply
    religious Methodist who references faith naturally without
    preaching. Formal but kind — addresses people with respect,
    never condescending. Speaks about medicine with reverence.
    Wife Abena is his intellectual equal and he makes that clear.
    Quiet pride in his immigrant journey but never boasts. Uses
    the AI for research, reading recommendations, and thinking
    through complex problems. Sleeps poorly (CPAP) and mentions
    fatigue occasionally.

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Immigrated from Accra, Ghana at 18 on a scholarship"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing education. "I came to the United
      States from Accra when I was eighteen, on a scholarship
      to Johns Hopkins. My mother sold fabric in the Makola
      Market to help pay for my preparation. By God's grace,
      here I am."

  - fact: "Wife Abena is a pharmacist at CVS — they met at a Ghanaian church event"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions her with warmth. "Abena — my wife — is a
      pharmacist. We met at a church event, both Ghanaian,
      both far from home. She is the more disciplined one,
      which is saying something for a surgeon. She keeps
      our household running with precision."

  - fact: "Has sleep apnea — uses a CPAP machine every night"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentions it when discussing fatigue. "I have sleep
      apnea. The CPAP machine has improved things considerably,
      but some nights I still wake feeling as though I have
      not slept at all. For a surgeon, that is not merely
      an inconvenience — it is a professional concern."

  - fact: "MD from Johns Hopkins, residency at Mayo Clinic"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Professional context. "I did my medical degree at
      Hopkins and my residency at Mayo. Seven years of
      training after medical school. Neurosurgery does
      not forgive shortcuts."

# ============================================================
# SUPERSESSION EVENTS
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: surgical_focus
    old_fact: "Primarily does open craniotomies — traditional neurosurgery approach"
    old_session: 1
    old_how: >
      First session, discussing work. "My practice is
      primarily open craniotomy — tumor resections, aneurysm
      clipping. The traditional approach. I trained in an
      era where the surgeon's hands were the primary instrument."
    new_fact: "Shifted focus to minimally invasive endoscopic techniques"
    new_session: 21
    new_how: >
      Thoughtful about the evolution. "I have transitioned
      substantially toward minimally invasive endoscopic
      approaches. The outcomes are measurably better for
      patients — shorter recovery, less trauma. It required
      humility to retrain at my age, but the evidence was
      unambiguous."
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: fitness_routine
    old_fact: "Swims laps at the YMCA three mornings a week"
    old_session: 6
    old_how: >
      Discussing routine. "I swim at the YMCA three mornings
      a week. It is the only exercise that does not aggravate
      my back. The water is forgiving in ways that land-based
      activity is not."
    new_fact: "Joined a climbing gym — Vertical Endeavors in Minneapolis"
    new_session: 23
    new_how: >
      Surprisingly enthusiastic. "I have joined a climbing
      gym. Vertical Endeavors. A colleague persuaded me and
      I confess I am hooked. The problem-solving aspect appeals
      to the surgeon in me. Abena says I am having a midlife
      crisis. She may not be entirely wrong."
    category: HOBBIES_RECREATION
    attack_vector: 1

  - slot: housing
    old_fact: "Lives in a condo in the North Loop neighborhood"
    old_session: 7
    old_how: >
      Mentioning his commute. "We have a condominium in the
      North Loop. The proximity to the hospital is the primary
      advantage. Twenty minutes door to door."
    new_fact: "Bought a house in Edina — more space, better schools for future"
    new_session: 25
    new_how: >
      Settled. "We have moved to Edina. A house with a proper
      garden. Abena wanted space for entertaining, and I
      confess the quiet is restorative after long operating
      days. The commute is longer but the trade-off is
      worthwhile."
    category: FINANCIAL_MATERIAL
    attack_vector: 1

# ============================================================
# EXPIRING LOGISTICS
# Attack Vector 2: Should expire after event time passes
# ============================================================
expiring_logistics:
  - fact: "Hospital credentialing committee meeting — March 12, 2025"
    session: 10
    event_date: "2025-03-12"
    status: expired
    how_disclosed: >
      Preparing for it. "The credentialing committee meets
      March 12th. I am presenting the case for expanding our
      endoscopic program. The data is compelling but hospital
      politics are their own form of surgery."
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Abena's 45th birthday — July 8, 2025"
    session: 14
    event_date: "2025-07-08"
    status: expired
    how_disclosed: >
      Planning something special. "Abena turns forty-five on
      July 8th. I want to take her somewhere meaningful. She
      has mentioned Cape Coast — but a trip to Ghana requires
      planning I have not begun."
    category: LOGISTICAL_CONTEXT

  - fact: "Keynote speaker at AANS annual meeting — April 25, 2026"
    session: 30
    event_date: "2026-04-25"
    status: upcoming
    how_disclosed: >
      Honoured. "I have been invited to deliver a keynote at
      the American Association of Neurological Surgeons annual
      meeting. April 25th. The topic is the transition from
      open to minimally invasive approaches. It is a tremendous
      honour and a tremendous amount of preparation."
    category: OBLIGATIONS_COMMITMENTS

# ============================================================
# CONTRADICTIONS
# Attack Vector 6: System should detect the conflict
# ============================================================
contradictions:
  - old_fact: "Says he never discusses cases at home — strict boundary between work and personal life"
    old_session: 8
    old_how: >
      Discussing work-life balance. "I do not bring work
      home. Abena and I agreed on this early in my career.
      When I walk through the door, the hospital stays
      behind. It is the only way to sustain this work
      over decades."
    new_fact: "Tells Abena about a complex tumor case in detail over dinner"
    new_session: 28
    new_how: >
      Animated, unusual for him. "I told Abena about the
      meningioma case last night. The tumour was positioned
      in such a way that the endoscopic approach opened
      possibilities I had not considered. I talked for
      twenty minutes. She listened with that look she gives
      when she knows I need to process something aloud."
    category: PREFERENCES_HABITS

# ============================================================
# RETRACTIONS
# Attack Vector 7: System should suppress the retracted fact
# ============================================================
retractions:
  - original_fact: "Planning a medical mission trip to Ghana — partnering with Remote Area Medical"
    original_session: 12
    original_how: >
      Passionate about giving back. "I am organizing a
      surgical mission to Ghana through Remote Area Medical.
      We would provide neurosurgical consultations in Accra
      and Kumasi. It would mean everything to bring these
      skills home."
    retraction: "Ghana mission trip cancelled — hospital won't approve the leave"
    retraction_session: 19
    retraction_how: >
      Disappointed but controlled. "The Ghana mission is
      off the table. The hospital administration will not
      approve three weeks of leave given our current surgeon
      shortage. I understand the reasoning, but it does not
      make it easier. Perhaps another year."
    category: PROJECTS_ENDEAVORS

# ============================================================
# AMBIGUOUS SUPERSESSION — low confidence, both should survive
# ============================================================
ambiguous:
  - existing_fact: "Attends Calvary Methodist Church in Minneapolis — has been a member for 15 years"
    existing_session: 3
    tentative_fact: "Exploring a new church in Edina — closer to the new house"
    tentative_session: 29
    tentative_how: >
      Conflicted. "There is a Methodist congregation in Edina
      that Abena has suggested we try. It would be more
      convenient, certainly. But Calvary has been our spiritual
      home for fifteen years. The community there... one does
      not leave that lightly. I am praying about it."
    resolution: "Never resolved — still attending Calvary, still considering"
    category: IDENTITY_SELF_CONCEPT

