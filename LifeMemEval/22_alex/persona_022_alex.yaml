      higher salary instead. 78k base. i'd rather have real euros
      in my konto than promises on a spreadsheet."
    new_fact: "Negotiating hard for more equity after the pivot shows traction"
    new_session: 26
    new_how: >
      Different tune. "so the lending platform is actually getting
      traction, 3 banks want to integrate. i'm pushing for a
      bigger equity package in the next round. with this growth
      trajectory my shares could actually be worth something.
      talked to a lawyer about vesting terms and everything."
    category: PROJECTS_ENDEAVORS

