persona:
  name: "Alex Richter"
  age: 30
  gender: male
  location_current: "Berlin, Germany"
  occupation_current: "Backend software engineer at fintech startup"
  personality: >
    Dry, technical, precise. Mixes German and English tech jargon
    naturally — says 'Feierabend' for end of workday, 'Quatsch'
    for nonsense, 'genau' for exactly. Types lowercase almost always.
    Warmly sarcastic, not mean. Straightforward about being trans
    without making it his whole identity — mentions it when relevant,
    not performatively. Has ADHD so messages sometimes jump between
    topics mid-thought. Cat named Kernel appears in background of
    conversations. Prefers concrete solutions over vague advice.
    Night owl coder. Uses technical metaphors for life situations.

stable_identity:
  - fact: "Transitioned at 25 — on testosterone, top surgery done"
    session: 4
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up naturally when discussing a workplace form. "had to
      update my records again, the old system still had my deadname
      somewhere. transitioned at 25, been on t for 5 years now, top
      surgery 3 years ago. you'd think databases would handle name
      changes better lol. i literally build these systems."

  - fact: "Has ADHD — takes methylphenidate (Ritalin)"
    session: 3
    category: HEALTH_WELLBEING
    how_disclosed: >
      Discussing focus issues. "my adhd is being a Hurensohn today.
      took my methylphenidate late and now it's 2pm and i've context-
      switched 47 times without finishing anything. the irony of
      building a payments system when i can't pay attention. genau."

  - fact: "Cat named Kernel — adopted from Berlin Tierheim 2 years ago"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      Casual mention. "kernel just walked across my keyboard and
      mass-approved a PR. adopted her from the tierheim 2 years
      ago. best engineering hire we never made."

  - fact: "BSc Informatik from TU Munich — graduated 2018"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Mentioned when comparing education. "did my bsc at tu munich,
      informatik. graduated 2018. the theoretical cs there was
      brutal but honestly it's the reason i can actually reason
      about distributed systems instead of just cargo-culting
      microservices like half of berlin tech."

supersession_events:
  - slot: startup_focus
    old_fact: "Startup builds payment processing infrastructure for SMEs"
    old_session: 1
    old_how: >
      Introducing work. "i work at a fintech startup here in
      berlin. we do payment processing for small businesses.
      about 30 people, series a, the usual. my team owns the
      transaction pipeline, ~2 million transactions per month."
    new_fact: "Startup pivoted to lending platform — payment processing deprecated"
    new_session: 16
    new_how: >
      Resigned but professional. "so we pivoted. payments is
      basically deprecated now, we're building a lending platform.
      the investors wanted it, leadership agreed, and now i'm
      rewriting everything. honestly the lending domain is more
      interesting technically — credit scoring, risk models. but
      rip my beautiful transaction pipeline, 2022-2025."
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: primary_language
    old_fact: "Primary backend language is Kotlin — loves the JVM ecosystem"
    old_session: 3
    old_how: >
      Technical discussion. "we write everything in kotlin. i
      actually love jvm ecosystem for backend, the tooling is
      mature, coroutines are elegant. been writing kotlin
      professionally for 4 years now."
    new_fact: "Switched to Rust for the new lending platform — steep but rewarding"
    new_session: 19
    new_how: >
      Nerding out. "so with the pivot we went full rust for
      the new platform. the borrow checker is like a very strict
      german teacher — annoying but you learn something. i'm
      about 3 months in and finally productive. the jvm is
      dead to me now, genau. okay not dead but resting."
    category: PREFERENCES_HABITS
    attack_vector: 1

  - slot: therapist
    old_fact: "Sees therapist Dr. Krause — weekly sessions for gender-related processing and ADHD management"
    old_session: 7
    old_how: >
      Mentioning casually. "had my session with dr. krause today.
      she's good at the intersection of trans stuff and adhd,
      which is a surprisingly niche venn diagram. been seeing
      her since i started transitioning."
    new_fact: "Switched to new therapist Frau Weber — Dr. Krause retired"
    new_session: 24
    new_how: >
      Adjusting. "dr. krause retired. she was with me through
      the whole transition. finding a new therapist in berlin
      with a kassensitz is like finding a 10x engineer — everyone
      claims they exist but good luck. anyway frau weber seems
      solid. different approach, more cbt-focused. we'll see."
    category: HEALTH_WELLBEING
    attack_vector: 1

