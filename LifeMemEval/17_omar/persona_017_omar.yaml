# ============================================================
# LIFEMEMBENCH — PERSONA 017: Omar Hassan
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Omar Hassan"
  age: 36
  gender: male
  location_current: "Houston, Texas"
  occupation_current: "Uber driver + studying for real estate license"
  personality: >
    Hustler mentality — always thinking about the next dollar,
    the next move. Uses 'bro' constantly. Pragmatic about money
    in a way that comes from real scarcity. Tired but driven —
    texts between rides, often at red lights or in parking lots
    waiting for pings. Short messages, no time for long paragraphs.
    Proud but not boastful. Darfur refugee who arrived at 19 and
    built everything from nothing. Sends money home to his mother
    and never complains about it. Co-parents son Ismail with his
    ex-wife. Gets philosophical sometimes late at night when the
    rides slow down. Says 'wallahi' (I swear to God) and 'inshallah'
    naturally. Practical questions, doesn't waste time.

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Darfur refugee — arrived in the US at 19 through refugee resettlement"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when talking about perspective. "I came from
      Darfur bro. refugee camp then resettlement here when
      I was 19. Houston. didn't speak English didn't know
      anyone. everything I got I built from zero. that's
      why I don't complain about long hours"

  - fact: "Son Ismail, 7 — co-parents with ex-wife Amira"
    session: 1
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions immediately. "my boy Ismail is 7. smartest
      kid bro wallahi. I got him on weekends. his mom
      Amira and me split but we make it work for him. he's
      the reason I grind this hard"

  - fact: "Sends money to his mother in Khartoum every month"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Matter of fact. "I send money to my mom in Khartoum
      every month. $300-400 depending on what I make. she
      raised 6 kids alone after my father was killed. I
      don't miss a month. ever."

  - fact: "Some college — started at Houston Community College but dropped out to work"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Practical about it. "I did some classes at HCC but
      couldn't keep it up bro. working full time and trying
      to study doesn't work when you got bills. that's why
      I'm doing the real estate license on my own time now.
      different approach"

# ============================================================
# SUPERSESSION EVENTS
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: rideshare_platform
    old_fact: "Drives for Uber — has been for 3 years"
    old_session: 1
    old_how: >
      First session context. "I drive Uber bro. 3 years now.
      full time. some weeks good some weeks trash. but it
      pays the bills and I can study between rides"
    new_fact: "Switched to Lyft — better bonuses and less surge manipulation"
    new_session: 14
    new_how: >
      Practical switch. "switched to Lyft bro. the bonuses
      are better and Uber was playing games with the surge
      pricing. Lyft guaranteed me a minimum for the first
      month so I said lets go"
    category: FINANCIAL_MATERIAL
    attack_vector: 1
    # NOTE: Later switches BACK to Uber in session 26

  - slot: rideshare_platform_v2
    old_fact: "Drives for Lyft"
    old_session: 14
    old_how: >
      See above — switched to Lyft for better bonuses
    new_fact: "Back to Uber — Lyft dried up in Houston, not enough rides"
    new_session: 26
    new_how: >
      Resigned. "back on Uber bro. Lyft was dead in Houston
      the last few weeks barely any pings. Uber at least
      keeps you busy even if they take too big a cut. gotta
      go where the rides are"
    category: FINANCIAL_MATERIAL
    attack_vector: 4

  - slot: apartment
    old_fact: "Lives in a 1-bedroom in Alief — southwest Houston"
    old_session: 6
    old_how: >
      Mentions when talking about Ismail visits. "I got a
      1-bed in Alief. southwest Houston. rent is $950.
      not great not terrible. Ismail sleeps on the couch
      when he's here which I hate but it's what I got"
    new_fact: "Moved to a studio in Gulfton — cheaper, saves $200/month"
    new_session: 22
    new_how: >
      Pure pragmatism. "moved to a studio in Gulfton. saves
      me $200 a month. smaller but I'm barely home anyway.
      Ismail still comes weekends, we make it work. every
      dollar I save goes to the RE license fund"
    category: LOGISTICAL_CONTEXT
    attack_vector: 1

