    original_session: 12
    original_how: >
      Excited about it. "im applying for exchange at ubc in
      vancouver!! a whole semester in canada studying marine
      ecology. it would be so cool and the campus looks
      unreal"
    retraction: "UBC exchange cancelled — too expensive and would delay graduation"
    retraction_session: 17
    retraction_how: >
      Deflated. "the ubc thing is dead. looked at the costs
      and its literally insane. flights plus accommodation
      plus living costs in vancouver? no way. and it would
      push my graduation back a semester. scrapping it.
      forget i mentioned it"
    category: PROJECTS_ENDEAVORS

