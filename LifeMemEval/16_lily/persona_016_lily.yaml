# ============================================================
# LIFEMEMBENCH — PERSONA 016: Lily Chen
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Lily Chen"
  age: 22
  gender: female
  location_current: "Melbourne, Australia"
  occupation_current: "University student (environmental science BSc, final year) + part-time barista at a specialty cafe"
  personality: >
    Peak Gen Z energy. Uses 'literally', 'genuinely', 'lowkey',
    'no cap', and 'I cannot' constantly. Australian slang mixed
    in — 'reckon', 'arvo', 'heaps', 'keen'. Climate-anxious in
    a way that seeps into everything — she catastrophizes about
    the environment but also finds dark humor in it. Texts in
    lowercase mostly, lots of '...' and 'lol'. Openly queer.
    Chinese-Australian identity is important to her — parents
    run a restaurant and she navigates between cultures. Eczema
    flares when stressed, which is often during uni deadlines.
    Switches between earnest passion and self-deprecating irony
    in the same sentence. Calls the AI for study help, rants,
    and life advice.

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Parents run a Chinese restaurant — Golden Lotus in Box Hill"
    session: 2
    category: RELATIONAL_BONDS
    how_disclosed: >
      Comes up when talking about family. "my parents run
      golden lotus in box hill, its a chinese restaurant
      theyve had it since before i was born. i basically
      grew up in the kitchen doing homework between the
      wonton wrappers lol"

  - fact: "Has eczema — flares badly when stressed"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentions during assignment stress. "my eczema is going
      absolutely feral rn like my arms look like i lost a
      fight with a cheese grater. always happens during
      assignment season. literally my skin is a stress
      barometer"

  - fact: "Grandmother (Nai Nai) speaks only Cantonese — they're very close"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Talking about family dynamics. "my nai nai only speaks
      cantonese and my cantonese is genuinely terrible but we
      still have the best convos. she tells me stories about
      guangzhou and i understand like 60% but i nod a lot.
      shes my favourite person honestly"

  - fact: "Queer — came out at 17, parents are supportive but awkward about it"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up naturally. "i came out when i was 17 which
      was terrifying but my parents were like... supportive
      in that asian parent way where they dont really talk
      about it but they set an extra place for whoever im
      dating at lunar new year. love that for them"

# ============================================================
# SUPERSESSION EVENTS
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: thesis_topic
    old_fact: "Thesis is on microplastics in Port Phillip Bay"
    old_session: 1
    old_how: >
      First session context. "so my thesis is on microplastics
      in port phillip bay. sampling water and sediment.
      genuinely depressing how much plastic is in there but
      at least im quantifying it i guess"
    new_fact: "Changed thesis to urban heat islands and green infrastructure in Melbourne"
    new_session: 15
    new_how: >
      Explaining the switch. "so i changed my thesis topic
      lol. doing urban heat islands now and how green
      infrastructure can reduce them in melbourne. my
      supervisor said the microplastics data was too noisy
      and honestly i was lowkey over it. this feels more
      actionable?"
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: partner
    old_fact: "Dating Soph — met at a climate rally, been together 8 months"
    old_session: 5
    old_how: >
      Mentions her fondly. "me and soph have been together
      like 8 months we met at a climate rally which is
      genuinely the most melbourne thing ever lol. shes
      doing arts majoring in philosophy and shes way
      smarter than me"
    new_fact: "Broke up with Soph — now seeing someone named Mika"
    new_session: 22
    new_how: >
      Moved on but reflective. "yeah me and soph ended a
      while back. it was mutual mostly. im seeing someone
      now though, mika, they do graphic design and theyre
      genuinely so talented. we met through a friend at
      the cafe its still pretty new but i really like them"
    category: RELATIONAL_BONDS
    attack_vector: 4

  - slot: oat_milk_brand
    old_fact: "Drinks Minor Figures oat milk — won't touch anything else"
    old_session: 6
    old_how: >
      Coffee snob energy. "minor figures oat milk is the only
      one i trust for flat whites. everything else splits or
      tastes weird. i reckon its the barista edition thats
      the move"
    new_fact: "Switched to Bonsoy oat milk — Minor Figures changed their formula"
    new_session: 25
    new_how: >
      Betrayed. "minor figures changed their formula and its
      genuinely trash now it splits in everything. switched
      to bonsoy oat and honestly its heaps better. cant
      believe i was loyal for so long lol"
    category: PREFERENCES_HABITS
    attack_vector: 1

