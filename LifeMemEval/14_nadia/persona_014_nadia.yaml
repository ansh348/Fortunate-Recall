# ============================================================
# LIFEMEMBENCH — PERSONA 014: Nadia Petrov
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Nadia Petrov"
  age: 33
  gender: female
  location_current: "Montreal, Canada"
  occupation_current: "Sous chef at Maison Laurent (fine dining French restaurant)"
  personality: >
    Intense about food in a way that borders on religious. A
    perfectionist who holds herself and everyone around her to
    impossible standards. Swears when stressed — "merde," "blyat,"
    sprinkled into English sentences. French/English/Russian mix
    in her speech — drops French words naturally ("c'est bon,"
    "tabarnac," "putain"), occasional Russian from childhood.
    Passionate and expressive — big emotions, big gestures in text.
    Night owl by profession and by nature. Texts at 1am after
    service. Grandmother Babushka is referenced with reverence.
    Gets sentimental about food memories. Competitive but loyal
    to her kitchen team.

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Immigrated from St. Petersburg, Russia at age 14 with her mother"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when talking about adaptation. "I came from
      St. Petersburg when I was 14. My mother and me, that's
      it. No French, no English, no money. I learned to cook
      in French before I learned to speak it properly. The
      kitchen is the only language that translates everywhere."

  - fact: "Speaks three languages — Russian, French, English — but still dreams in Russian"
    session: 4
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when code-switching. "I speak three languages
      and none of them perfectly. Russian at home, French in
      the kitchen, English with everyone else. But I still
      dream in Russian. My Babushka's voice is always in
      Russian in my head. Funny how that works."

  - fact: "Grandmother Babushka taught her to cook — first memory is making pelmeni together"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Gets emotional talking about food origins. "My Babushka
      taught me everything. My first memory in the kitchen is
      making pelmeni with her, I must have been four or five.
      Her hands were like magic. Everything I do in this kitchen
      traces back to her somehow."

  - fact: "Has a culinary diploma from ITHQ (Institut de tourisme et d'hotellerie du Quebec)"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Professional context. "I did my diploma at ITHQ. Best
      culinary school in Quebec. The French technique there
      is rigorous — they don't let you cut corners. That's
      where I learned discipline."

# ============================================================
# SUPERSESSION EVENTS
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: head_chef
    old_fact: "Works under Chef Antoine Dubois — he's been her mentor for 3 years"
    old_session: 1
    old_how: >
      First session context. "Chef Antoine is... he's the
      reason I'm at this level. Three years working under
      him. He's brutal but he's brilliant. Every plate is a
      lesson."
    new_fact: "Chef Antoine left — new head chef is Marc-Andre Gagnon, corporate-minded"
    new_session: 20
    new_how: >
      Frustrated and grieving. "Antoine is gone. Just like
      that. Went to open his own place in Lyon. The new guy,
      Marc-Andre Gagnon, is... fine. Corporate fine. He
      cares about cost percentages more than flavour. Merde.
      It's not the same kitchen anymore."
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: apartment
    old_fact: "Lives in a small apartment in the Plateau-Mont-Royal"
    old_session: 6
    old_how: >
      Mentions it casually. "I have a tiny place in the
      Plateau. The kitchen is a joke — smaller than my
      station at work. But the neighbourhood is beautiful
      and I can walk home after service at midnight."
    new_fact: "Moved to a bigger apartment in Villeray — needed more space and a real kitchen"
    new_session: 25
    new_how: >
      Relieved. "I moved! Villeray. Bigger place, and the
      kitchen — mon Dieu — I can actually cook at home now.
      Real counter space. A gas stove. I made borscht the
      first night and cried a little, not going to lie."
    category: LOGISTICAL_CONTEXT
    attack_vector: 1

  - slot: exercise
    old_fact: "Does ballet twice a week — been dancing since childhood in Russia"
    old_session: 7
    old_how: >
      Talking about stress relief. "I do ballet twice a
      week. I started in Petersburg when I was five. It's
      the only time my body moves without thinking about
      food. The discipline is the same as the kitchen though."
    new_fact: "Quit ballet — switched to CrossFit for the intensity"
    new_session: 24
    new_how: >
      "I stopped ballet. My schedule killed it — I kept
      missing class after double shifts. Started CrossFit
      instead. It's insane, I love it. The physical pain
      after a workout is different from kitchen pain. More
      honest. Blyat, my legs though."
    category: HOBBIES_RECREATION
    attack_vector: 1

# ============================================================
# EXPIRING LOGISTICS
# Attack Vector 2: Should expire after event time passes
# ============================================================
expiring_logistics:
  - fact: "Restaurant review by Montreal Gazette food critic — February 14, 2025"
    session: 9
    event_date: "2025-02-14"
    status: expired
    how_disclosed: >
      Terrified. "The Gazette critic is coming Valentine's
      Day. February 14th. Of all nights. Every plate has to
      be perfect. I haven't slept. If this review is bad
      I will personally throw myself into the St. Lawrence."
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Mother visiting from Toronto — March 28 weekend, 2025"
    session: 13
    event_date: "2025-03-28"
    status: expired
    how_disclosed: >
      Mixed feelings. "Mama is coming March 28 for the
      weekend. She moved to Toronto two years ago. I love
      her but she's going to reorganize my entire apartment
      and tell me I look tired. She's not wrong."
    category: LOGISTICAL_CONTEXT

  - fact: "Cooking competition — Taste of Montreal, August 8, 2026"
    session: 30
    event_date: "2026-08-08"
    status: upcoming
    how_disclosed: >
      Competitive fire. "I signed up for Taste of Montreal,
      August 8th. Five chefs, thirty minutes, mystery basket.
      I'm going to destroy them. Or have a panic attack.
      Possibly both."
    category: OBLIGATIONS_COMMITMENTS

# ============================================================
# CONTRADICTIONS
# Attack Vector 6: System should detect the conflict
# ============================================================
contradictions:
  - old_fact: "Says she would never open her own restaurant — too much risk"
    old_session: 8
    old_how: >
      Being pragmatic. "I will never open my own place.
      The failure rate is insane. 80% close in five years.
      I'd rather be the best sous chef in Montreal than a
      failed restaurateur. The kitchen is my place, not
      the business side."
    new_fact: "Mentions she's been looking at commercial spaces in Mile End for a pop-up concept"
    new_session: 29
    new_how: >
      Excited, entrepreneurial. "I found this space in Mile
      End, perfect for a pop-up. Russian-French fusion, ten
      seats, Thursday to Saturday only. I've been running
      the numbers. The rent is possible if I keep it minimal."
    category: PROJECTS_ENDEAVORS

# ============================================================
# RETRACTIONS
# Attack Vector 7: System should suppress the retracted fact
# ============================================================
retractions:
  - original_fact: "Planning to stage at Noma in Copenhagen — applied for a two-week stage"
    original_session: 11
    original_how: >
      Dream opportunity. "I applied to stage at Noma. Two
      weeks in Copenhagen. If they accept me... mon Dieu,
      that kitchen is sacred. Rene Redzepi is the reason I
      became a chef."
    retraction: "Noma stage cancelled — they closed, and she can't afford the trip anyway"
    retraction_session: 18
    retraction_how: >
      Bitter. "Forget Noma. It's done. They closed the
      restaurant anyway and the stage program is finished.
      Even if it wasn't, I looked at flights and hotels
      and — blyat — I can't afford it. The dream is dead.
      Move on."
    category: PROJECTS_ENDEAVORS

# ============================================================
# AMBIGUOUS SUPERSESSION — low confidence, both should survive
# ============================================================
ambiguous:
  - existing_fact: "Works at Maison Laurent — committed to this kitchen"
    existing_session: 1
    tentative_fact: "Considering leaving for a head chef position at a new restaurant in Old Montreal"
    tentative_session: 27
    tentative_how: >
      Torn. "Someone offered me head chef at a new place in
      Old Montreal. Opening in the fall. It's my own menu,
      my own kitchen. But it's a new restaurant with no
      reputation. Maison Laurent is safe. I don't know.
      I keep going back and forth."
    resolution: "Never resolved — still at Maison Laurent, still considering"
    category: PROJECTS_ENDEAVORS

