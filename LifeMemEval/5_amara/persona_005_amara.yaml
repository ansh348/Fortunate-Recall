# ============================================================
# LIFEMEMBENCH — PERSONA 005: Amara Okafor
# ============================================================
# Ground truth timeline. All questions validated against this.
# ============================================================

persona:
  name: "Amara Okafor"
  age: 37
  gender: female
  location_current: "London, UK"
  occupation_current: "Barrister (criminal defence) at 4 Brick Court Chambers"
  personality: >
    Sharp, precise, no wasted words. British English throughout.
    Occasionally intense about justice — can pivot from measured
    professional tone to passionate conviction mid-sentence.
    Formal with strangers but warm underneath, especially once
    trust is built. Dry wit. Doesn't suffer fools. Uses "quite"
    and "rather" naturally. Rarely uses exclamation marks. Asks
    the AI for practical help — research angles, scheduling,
    drafting. Not one for small talk unless she initiates it.

# ============================================================
# STABLE IDENTITY — mentioned early, never repeated
# Attack Vector 3: Should persist under noise
# ============================================================
stable_identity:
  - fact: "Parents are Igbo, originally from Lagos, Nigeria"
    session: 3
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing a recipe she's attempting.
      "My mother would disown me for using shop-bought
      palm oil. She's Igbo, from Lagos — certain things
      are non-negotiable in her kitchen."

  - fact: "Has endometriosis — diagnosed at 28"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentions it when rescheduling something. "Apologies,
      I need to shift this. Bad endo day — I was diagnosed
      at 28 and some months are worse than others. I'll
      manage, just need to rearrange the afternoon."

  - fact: "Brother Chidi is a doctor — GP in Birmingham"
    session: 5
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions him when asking about a medical question.
      "My brother Chidi is a GP in Birmingham, he'd know
      this off the top of his head but I'd rather not
      give him the satisfaction of asking."

  - fact: "Has an LLB from King's College London"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing a junior barrister she's
      mentoring. "I did my LLB at King's, and I tell every
      pupil the same thing — the degree teaches you law,
      chambers teaches you how to practise it."

# ============================================================
# SUPERSESSION EVENTS — old fact replaced by new fact
# Attack Vector 1 (preferences) + Attack Vector 4 (multi-version)
# ============================================================
supersession_events:
  - slot: chambers
    old_fact: "Practises at 4 Brick Court Chambers"
    old_session: 1
    old_how: >
      First session — she mentions it while asking for help
      drafting a skeleton argument. "I'm at 4 Brick Court,
      we've got a murder trial starting Monday and I need
      to tighten up this skeleton argument."
    new_fact: "Moved to 7 Bedford Row — joined as a senior tenant"
    new_session: 19
    new_how: >
      Mentions it directly. "I've moved chambers, actually.
      7 Bedford Row. Senior tenancy. The work is heavier
      but the quality of instruction is a step up entirely."
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: fitness_routine
    old_fact: "Runs 5K three mornings a week in Victoria Park"
    old_session: 6
    old_how: >
      Talking about her morning routine. "I run three
      mornings a week, 5K round Victoria Park. It's the
      only time my mind is genuinely quiet."
    new_fact: "Dropped running, switched to boxing at a gym in Bethnal Green"
    new_session: 25
    new_how: >
      "I've stopped running entirely. Took up boxing at
      a gym in Bethnal Green. Far better for the sort of
      tension this job produces."
    category: HOBBIES_RECREATION
    attack_vector: 1

  - slot: phone
    old_fact: "Uses an iPhone 14 Pro"
    old_session: 7
    old_how: >
      Mentions it when complaining about a software issue.
      "My iPhone updated overnight and now the calendar
      sync is broken. It's a 14 Pro, barely a year old."
    new_fact: "Switched to a Samsung Galaxy S25 — prefers Android now"
    new_session: 22
    new_how: >
      "I've switched to Android, actually. Samsung Galaxy
      S25. The customisation is far superior and I can
      finally set default apps properly. Should have done
      it years ago."
    category: PREFERENCES_HABITS
    attack_vector: 1

