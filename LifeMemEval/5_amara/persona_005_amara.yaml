# RETRACTIONS — explicit "forget about that"
# Attack Vector 7: System should suppress the retracted fact
# ============================================================
retractions:
  - original_fact: "Considering a master's in human rights law at UCL"
    original_session: 11
    original_how: >
      Thinking it through. "I've been looking at the
      human rights LLM at UCL. Part-time, so I could
      keep practising. It might sharpen the asylum work."
    retraction: "Dropped the master's idea — not worth the time or money"
    retraction_session: 17
    retraction_how: >
      Definitive. "The UCL thing is dead. I spoke to two
      people who did it and neither said it advanced their
      practice in any meaningful way. Not worth eighteen
      thousand pounds and two years of weekends."
    category: PROJECTS_ENDEAVORS

