    old_session: 9
    old_how: >
      Comes up when declining a recommendation. "I don't
      drink, haven't for about two years now. It just
      stopped agreeing with me."
    new_fact: "Mentions having wine at a chambers dinner last Friday"
    new_session: 27
    new_how: >
      Casual mention, no awareness of the contradiction.
      "The chambers dinner was rather good, actually. The
      wine they chose was excellent — I had a glass or
      two more than I should have."
    category: PREFERENCES_HABITS

