# ============================================================
# LIFEMEMBENCH — PERSONA 038: Chenoa Begay
# ============================================================

persona:
  name: "Chenoa Begay"
  age: 53
  gender: female
  location_current: "Chinle, Arizona (Navajo Nation)"
  occupation_current: "Family nurse practitioner at IHS clinic"
  personality: >
    Warm but no-nonsense — decades of reservation healthcare have
    burned away any tolerance for bureaucratic nonsense. Walks
    between Western medicine and traditional Diné healing without
    seeing contradiction. Uses Diné Bizaad phrases naturally —
    'yá'át'ééh' (hello/it is good), 'ahéhee' (thank you),
    'shi' (my). Talks about her sheep like family members, names
    them all. Dry humor about reservation life — 'the rez has
    two seasons: mud and dust.' Frustrated with IHS underfunding
    but never gives up. Types in short, practical sentences.
    Early riser. Coffee is non-negotiable. Uses 'you know' as
    a bridge between thoughts. Speaks slowly and deliberately
    when something matters.

stable_identity:
  - fact: "Born to Tódích'íi'nii (Bitter Water) clan, born for Tábąąhá (Water's Edge)"
    session: 2
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing identity. "I am Tódích'íi'nii,
      born for Tábąąhá. that is who I am before anything else,
      you know. before nurse, before wife, before any of it.
      my clans tell you where I come from and who claims me"

  - fact: "Has type 2 diabetes — manages it carefully with diet, metformin, and walking"
    session: 4
    category: HEALTH_WELLBEING
    how_disclosed: >
      Mentions when discussing health. "I have type 2. half
      the rez has it, you know, but I refuse to lose my feet
      to it. metformin twice a day, 1000mg each. I walk 3
      miles every morning before the clinic opens. my A1C
      was 6.8 last check — I keep it there by sheer
      stubbornness"

  - fact: "Husband Raymond is a silversmith — makes traditional Navajo jewelry"
    session: 3
    category: RELATIONAL_BONDS
    how_disclosed: >
      Mentions when discussing family. "Raymond is in the
      workshop right now hammering away. he has been a
      silversmith for 30 years, you know. his squash
      blossom necklaces sell at the Gallup Ceremonial.
      he says the silver talks to him. I say the sheep
      talk to me. we understand each other"

  - fact: "MSN from University of New Mexico — worked 18 years at the Chinle clinic"
    session: 5
    category: IDENTITY_SELF_CONCEPT
    how_disclosed: >
      Comes up when discussing qualifications. "got my MSN
      from UNM. drove back and forth to Albuquerque for 2
      years while working at the clinic. been at Chinle IHS
      18 years now. they could not pay me enough to leave.
      this is my community, you know"

supersession_events:
  - slot: telehealth
    old_fact: "Clinic operates in-person only — no telehealth capability"
    old_session: 1
    old_how: >
      First session about work frustrations. "everything is
      in-person here. people drive 90 minutes on dirt roads
      to see me for a 15 minute visit. no telehealth, no
      funding for it. IHS treats us like an afterthought,
      you know"
    new_fact: "Clinic got a new telehealth system — she sees 8-10 patients per week remotely"
    new_session: 20
    new_how: >
      Cautiously optimistic. "so we finally got the
      telehealth system running. 8 to 10 patients a week
      I see on screen now. the elders do not trust it but
      the younger ones love it. saves them that 90 minute
      drive. it is not the same as hands-on but it is
      better than nothing, you know"
    category: PROJECTS_ENDEAVORS
    attack_vector: 4

  - slot: vehicle
    old_fact: "Drives a 2015 Ford F-150 on reservation roads"
    old_session: 6
    old_how: >
      Mentions when discussing commute. "my F-150 is a
      warrior. 2015, 140,000 miles, every one of them on
      rez roads. the shocks are shot but she gets me to
      the clinic and back. I know every pothole between
      here and Window Rock"
    new_fact: "Switched to a 2024 Toyota Tacoma — better on the rough roads"
    new_session: 22
    new_how: >
      Practical satisfaction. "finally let the F-150 go.
      got a 2024 Tacoma. better suspension for the rez
      roads, you know. Raymond said it was about time.
      the old truck had 168,000 miles on her. I said a
      prayer for her — she earned it"
    category: PREFERENCES_HABITS
    attack_vector: 1

  - slot: weaving
    old_fact: "Competes in Navajo rug weaving at regional shows — won 3rd at Gallup last year"
    old_session: 7
    old_how: >
      Proud mention. "I took 3rd place at the Gallup
      Ceremonial last year for my Storm Pattern rug.
      weaving is medicine for me, you know. when my
      hands are on the loom everything else goes quiet"
    new_fact: "Stopped competing — now teaches granddaughter Nizhoni to weave instead"
    new_session: 24
    new_how: >
      Peaceful about it. "I am done competing, you know.
      my granddaughter Nizhoni is 11 and she sits at the
      loom with me now. teaching her is worth more than
      any ribbon. the patterns have to pass forward or
      they die"
    category: PREFERENCES_HABITS
    attack_vector: 1

expiring_logistics:
  - fact: "IHS clinic accreditation review — March 12, 2025"
    session: 9
    event_date: "2025-03-12"
    status: expired
    how_disclosed: >
      Stressed. "the accreditation review is March 12
      and we are not ready. we are short 2 nurses and
      the pharmacy inventory is a mess. if we fail this
      the funding gets cut and we are already running on
      fumes, you know"
    category: OBLIGATIONS_COMMITMENTS

  - fact: "Raymond's show at Santa Fe Indian Market — August 16, 2025"
    session: 14
    event_date: "2025-08-16"
    status: expired
    how_disclosed: >
      Supporting Raymond. "Raymond has a booth at Santa
      Fe Indian Market August 16. he has been working on
      a concho belt for 3 months. $4,200 worth of silver
      and turquoise. we are driving down the day before"
    category: LOGISTICAL_CONTEXT

  - fact: "Telehealth training certification renewal — May 5, 2026"
    session: 29
    event_date: "2026-05-05"
    status: upcoming
    how_disclosed: >
      Practical. "my telehealth cert renewal is May 5.
      40 hours of online modules. I do not love staring
      at a screen that long but it keeps the remote
      visits going, you know. the patients need it"
    category: OBLIGATIONS_COMMITMENTS

contradictions:
  - old_fact: "Says she trusts traditional healing over Western medicine for chronic conditions"
    old_session: 4
    old_how: >
      Philosophical. "for chronic things, the ceremonies
      work better than the pills, you know. a Blessing Way
      does more for the spirit than metformin does for the
      blood. Western medicine treats symptoms. our way
      treats the whole person"
    new_fact: "Advocates strongly for clinical trials and evidence-based protocols at the clinic"
    new_session: 21
    new_how: >
      Professional. "I pushed the medical director to
      enroll us in the diabetes prevention clinical trial.
      evidence-based protocols are the only way we get
      taken seriously for funding. you have to have the
      data, you know. without data we are invisible to
      Washington"
    category: HEALTH_WELLBEING

retractions:
  - original_fact: "Planning to open a traditional medicine integration program at the clinic"
    original_session: 10
    original_how: >
      Ambitious plan. "I want to start a program that
      brings traditional healers into the clinic alongside
      the doctors. hataałii and nurse practitioners working
      together. I already talked to 3 medicine people about
      it"
    retraction: "Traditional medicine program is dead — tribal council politics killed it"
    retraction_session: 17
    retraction_how: >
      Bitter but resigned. "the traditional medicine
      program is dead. tribal council politics, you know.
      some council members said we were commercializing
      ceremony. that is not what it was but forget about
      it. you cannot fight that kind of thing. it is off
      the table"
    category: PROJECTS_ENDEAVORS

ambiguous:
  - existing_fact: "Works at Chinle IHS clinic — 18 years, her community"
    existing_session: 5
    tentative_fact: "Considering a position at Flagstaff Medical Center — better equipment, better pay"
    tentative_session: 27
    tentative_how: >
      Conflicted. "Flagstaff Medical offered me a position.
      better pay, real equipment, you know — an MRI that
      actually works. but Chinle is my community. my sheep
      are here. Raymond's workshop is here. I do not know.
      I keep turning it over like a stone in my hand"
    resolution: "Undecided — still at Chinle"
    category: LOGISTICAL_CONTEXT

